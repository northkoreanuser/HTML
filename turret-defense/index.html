<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
  body { background:#0a0a0a; overflow:hidden; cursor:default; font-family:'Courier New',monospace; }
  canvas { display:block; cursor:none; }
  #overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.85);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:#0f0; font-family:'Courier New',monospace; z-index:10;
  }
  #overlay h1 { font-size:48px; letter-spacing:0.2em; margin-bottom:16px; text-shadow:0 0 20px #0f0; }
  #overlay p { font-size:14px; letter-spacing:0.15em; color:#0a0; margin-bottom:32px; text-align:center; line-height:1.8em; }
  #overlay button {
    background:none; border:1px solid #0f0; color:#0f0; font-family:'Courier New',monospace;
    font-size:16px; letter-spacing:0.2em; padding:12px 36px; cursor:pointer;
  }
  #overlay button:hover { background:#0f0; color:#000; }
  #overlay.hidden { display:none; }

  #shop {
    position:fixed; inset:0; background:rgba(0,0,0,0.95);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:#0f0; font-family:'Courier New',monospace; z-index:20;
    overflow-y:auto; max-height:100%;
    cursor:default; padding:8px 0;
  }
  #shop.hidden { display:none; }
  #shop h2 { font-size:20px; letter-spacing:0.3em; margin-bottom:6px; text-shadow:0 0 12px #0f0; }
  .shop-item {
    border:1px solid #0a0; padding:7px 18px; margin:3px; width:600px;
    display:flex; justify-content:space-between; align-items:center;
    cursor:pointer; transition:all 0.1s;
  }
  .shop-item:hover:not(.maxed):not(.no-money):not(.locked) { background:#0a0; color:#000; border-color:#0f0; cursor:pointer; }
  .shop-item.maxed { border-color:#444; color:#444; cursor:default; }
  .shop-item.no-money { border-color:#550000; color:#aa0000; cursor:default; }
  .shop-item.locked { border-color:#333; color:#666; cursor:default; }
  .shop-item .item-name { font-size:13px; letter-spacing:0.03em; font-weight:bold; }
  .shop-item .item-desc { font-size:10px; color:#aaa; margin-top:2px; }
  .shop-item .item-cost { font-size:13px; }
  #shop-money { font-size:16px; margin-bottom:6px; letter-spacing:0.2em; color:#ff0; }
  .shop-close-btn {
    margin-top:8px; background:none; border:1px solid #0f0; color:#0f0;
    font-family:'Courier New',monospace; font-size:12px; letter-spacing:0.2em;
    padding:5px 20px; cursor:pointer;
  }
  .shop-close-btn:hover { background:#0f0; color:#000; }
  #bonus-display {
    display: none;
  }
  #debug-indicator {
    position:fixed; top:10px; left:50%; transform:translateX(-50%);
    color:#ff00ff; font-size:10px;
    font-family:'Courier New',monospace; background:rgba(0,0,0,0.6); padding:2px 10px;
    border-radius:4px; z-index:15; pointer-events:none;
    white-space:nowrap;
  }
  .reset-btn {
    background:#ff4444; border:none; color:white; font-family:'Courier New',monospace;
    font-size:11px; padding:4px 12px; margin-left:10px; cursor:pointer;
    border-radius:3px;
  }
  .reset-btn:hover { background:#ff6666; }
  @keyframes blink {
    0%,100%{ opacity:1; text-shadow:0 0 12px #0f0, 0 0 24px #0f0; }
    50%{ opacity:0.15; text-shadow:none; }
  }
  #missile-hint {
    position:fixed; top:12px; left:50%; transform:translateX(-50%);
    color:#0f0; font-family:'Courier New',monospace; font-size:13px;
    letter-spacing:0.18em; z-index:5; pointer-events:none;
    animation:blink 1.1s ease-in-out infinite; white-space:nowrap;
  }
  #missile-hint.hidden { display:none; }
  .save-load-row {
    display:flex; gap:14px; margin-bottom:20px;
  }
  .save-load-btn {
    background:none; border:1px solid #0a0; color:#0a0;
    font-family:'Courier New',monospace; font-size:12px;
    letter-spacing:0.18em; padding:6px 20px; cursor:pointer;
  }
  .save-load-btn:hover { background:#0a0; color:#000; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="bonus-display">✨ +0💰</div>
<div id="debug-indicator" style="display:none;">🐛 DEBUG MODE ON</div>
<div id="cheat-indicator" style="display:none; position:fixed; top:10px; left:50%; transform:translateX(-50%); color:#ffee00; font-size:10px; font-family:'Courier New',monospace; background:rgba(0,0,0,0.6); padding:2px 10px; border-radius:4px; z-index:15; pointer-events:none; white-space:nowrap;">🥚 CHEAT MODE ON</div>
<div id="missile-hint" class="hidden">[ S p a c e B a r ] &nbsp; 폭탄 사용 &nbsp; (💰30)</div>

<div id="overlay">
  <h1 id="ovTitle">TURRET DEFENSE</h1>
  <p id="ovMsg">좌클릭: 발사 &nbsp;|&nbsp; 우클릭: 특수탄 발사<br><br>[S] 상점 열기<br><br>SpaceBar: 폭탄 (💰30)<br><br>웨이브 15 이상에서 게임이 끝날 시<br>소지 금액 1,000골드당 100골드를 이후 시작시 지급 (최대: 20,000)</p>
  <button id="ovBtn">[ DEPLOY ]</button>
  <div class="save-load-row" style="margin-top:18px;">
    <button class="save-load-btn" id="saveBtn">[ SAVE ]</button>
    <button class="save-load-btn" id="loadBtn">[ LOAD ]</button>
    <input type="file" id="loadFile" accept=".json" style="display:none;">
  </div>
</div>

<div id="shop" class="hidden">
  <h2>[ SHOP ]</h2>
  <div id="shop-money">💰 0</div>
  <div id="shop-items"></div>
  <div style="display:flex; gap:12px; margin-top:8px;">
    <button id="shop-close" class="shop-close-btn">[ CLOSE ]</button>
    <button id="shop-giveup" class="shop-close-btn">[ GIVE UP ]</button>
  </div>
</div>

<script>
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
const actx = new (window.AudioContext || window.webkitAudioContext)();

let W, H;
function resize() { W = cvs.width = window.innerWidth; H = cvs.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);
window.addEventListener('contextmenu', e => e.preventDefault());

let mx = W/2, my = H/2;
let gameState = 'wait';  // wait, play, dead
let shopOpen = false;
let debugMode = false;
let cheatMode = false;       // EGG 치트 모드
let donateClicked = false;   // 기부하기 1회 이상 클릭 여부
let eggActivated = false;    // EGG 버튼 1회 이상 클릭 여부 (시작골드 반영 안됨)

// ----- 게임 상태 -----
let hp, maxHpBase, ammo, ammoMax, reloading, reloadTimer;
let rightAmmo, rightAmmoMax, rightReloading, rightReloadTimer;
let score, money, wave, killCountForRegen;
let spawnTimer, firing, lastFire, rightFiring, lastRightFire;
let bullets, enemies, sparks, explosions, coinParticles;
let muzzleFlash, recoilOff, shotCount, screenShake;
let missileCooldown, missileReady;
let waveTimer = 0;
let waveAnnounceTimer = 0;
let waveAnnounceText = '';
const FRAMES_PER_WAVE = 1800;  // 30초 = 60fps × 30
let missileDamage = 3;
let missileDamageLevel = 0;
let missileCooldownLevel = 0;
let waveJumpCount = 0;
const MAX_WAVE_JUMP = 3;
const MAX_WAVE = 40;

// 자동 터렛
let autoTurrets = [];
let autoTurretCount = 0;
const MAX_AUTO_TURRETS = 2;
const AUTO_TURRET_FIRE_DELAY = 45; // 0.75초마다 1발 (플레이어 좌클릭보다 15배 느림)
const AUTO_TURRET_COSTS = [800, 2000];
let autoTurretDamageLevel = 0;
let autoTurretDamageCost = 400;
const MAX_AUTO_TURRET_DAMAGE_LEVEL = 5;
// 데미지 0.5 고정, 업글 시 +0.5씩 (풀업 MAX 5레벨 = 3.0)
function getAutoTurretDamage() { return 0.5 + autoTurretDamageLevel * 0.5; }

// 폭격 이펙트
let bombDrops = [];

// 동적 웨이브 길이 (기본 150초, 웨이브마다 10초 증가, 킬로 가속)
function getFramesPerWave() {
  return 9000 + (wave - 1) * 900;
}
// 웨이브 점프: wave < 30 이면 무조건 가능, +10하되 최대 30으로 clamp

// ----- 영구 업그레이드 (시작 보너스, LocalStorage) -----
let permanentBonus = 0;
const PERMANENT_THRESHOLD = 1000;
const PERMANENT_RATE = 100;
const MAX_START_MONEY = 20000;

// ----- 게임 내 업그레이드 -----
let upgrades = {
  rightFireRate: 0,
  rightPower: 0,
  magazine: 0,
  coinBonus: 0,
  maxHp: 0,
  hpRegen: 0
};

// 가격 (레벨당 증가)
const FIRE_RATE_COST = [100, 250, 500, 850, 1300, 1900, 2700, 3700, 5000, 6500];
const POWER_COST = [40, 80, 150, 250, 380, 550];
let magazineCost = 20;
let coinBonusCost = 100;
let hpUpCost = 80;
let regenCost = 100;
let missileDamageCost = 100;
let missileCooldownCost = 80;
let killTimeCost = 150;

const MAX_FIRE_RATE_LEVEL = 10;
const MAX_POWER_LEVEL = 5;
const MAX_MAGAZINE_LEVEL = 999;
const MAX_COIN_BONUS_LEVEL = 250;
const MAX_HP_LEVEL = 30;
const MAX_REGEN_LEVEL = 10;
const MAX_MISSILE_DAMAGE_LEVEL = 10;
const MAX_MISSILE_COOLDOWN_LEVEL = 10;
const MAX_KILL_TIME_LEVEL = 10;

// 배열 초과 시 마지막 값에서 계속 증가하는 비용 헬퍼
function getFireRateCost(level) {
  if(level < FIRE_RATE_COST.length) return FIRE_RATE_COST[level];
  return FIRE_RATE_COST[FIRE_RATE_COST.length-1] + (level - FIRE_RATE_COST.length + 1) * 2000;
}
function getPowerCost(level) {
  if(level < POWER_COST.length) return POWER_COST[level];
  return POWER_COST[POWER_COST.length-1] + (level - POWER_COST.length + 1) * 300;
}

// 0레벨: 250ms, 10레벨: 33ms. 치트모드에서는 하한 없음
function getRightFireDelay() { 
  const val = Math.round(250 - upgrades.rightFireRate * 21.7);
  return cheatMode ? Math.max(1, val) : Math.max(33, val);
}
function getRightDamage() { return 1 + upgrades.rightPower; }
// 공속 0레벨: ammoMax*0.5, 풀업(10레벨): ammoMax*1.5 (왼쪽의 1.5배)
function getRightMagazine() { return Math.max(1, Math.floor(ammoMax * (0.5 + upgrades.rightFireRate * 0.1))); }
function getMaxHp() { return 5 + Math.min(MAX_HP_LEVEL, upgrades.maxHp); }
function getCoinBonus() { return upgrades.coinBonus * 2; }
function getRegenHeal() { return 1 + (Math.min(MAX_REGEN_LEVEL, upgrades.hpRegen) * 0.5); }
function getMissileDamage() { return 2 + missileDamageLevel * 2; }
// 기본 30초, 풀업(10레벨) 시 10초. 치트모드에서는 하한 없음
function getMissileCooldownSecs() {
  const val = 30 - missileCooldownLevel * 2;
  return cheatMode ? Math.max(1, val) : Math.max(10, val);
}
// 기본 2초(120f), 업글마다 +1초(60f), 풀업 시 12초(720f)
function getKillTimeReduction() { return 120 + upgrades.killTime * 60; }

// ── SAVE / LOAD ──────────────────────────────
function saveProgress() {
  const data = JSON.stringify({ permanentBonus }, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'turret_save.json';
  a.click();
  URL.revokeObjectURL(a.href);
}
function loadProgress(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const json = JSON.parse(e.target.result);
      if(typeof json.permanentBonus === 'number') {
        permanentBonus = Math.min(Math.max(0, json.permanentBonus), MAX_START_MONEY);
        savePermanentBonus();
        updateBonusDisplay();
        alert(`로드 완료! 시작 골드: +${permanentBonus}💰`);
      } else { alert('잘못된 세이브 파일입니다.'); }
    } catch { alert('파일을 읽을 수 없습니다.'); }
  };
  reader.readAsText(file);
}
// ─────────────────────────────────────────────

function loadPermanentBonus() {
  try {
    let saved = localStorage.getItem('turret_permanent_bonus');
    if(saved && !isNaN(parseInt(saved))) permanentBonus = parseInt(saved);
    else permanentBonus = 0;
    if(permanentBonus > MAX_START_MONEY) permanentBonus = MAX_START_MONEY;
  } catch(e) { permanentBonus = 0; }
  updateBonusDisplay();
}
function savePermanentBonus() {
  try { localStorage.setItem('turret_permanent_bonus', permanentBonus); } catch(e) {}
}
function updateBonusDisplay() {
  document.getElementById('bonus-display').innerHTML = `✨ +${permanentBonus}💰`;
}
function resetPermanentBonus() {
  if(confirm('영구 보너스를 0으로 초기화하시겠습니까?')) {
    permanentBonus = 0;
    savePermanentBonus();
    updateBonusDisplay();
    alert('영구 보너스가 초기화되었습니다.');
  }
}
function updatePermanentBonusFromMoney(currentMoney) {
  if(debugMode) return;
  // 15웨이브 이상 + 스코어 400 이상에서만 추가금 적립
  if(wave < 15) return;
  if(score < 400) return;
  let addBonus = Math.floor(currentMoney / PERMANENT_THRESHOLD) * PERMANENT_RATE;
  if(addBonus > 0) {
    let newBonus = permanentBonus + addBonus;
    if(newBonus > MAX_START_MONEY) newBonus = MAX_START_MONEY;
    permanentBonus = newBonus;
    savePermanentBonus();
    updateBonusDisplay();
  }
}

// 보스 스폰 추적
let bossSpawnedThisWave = false;

// 승리 체크 — 보스 처치 시 bossClear()에서 처리됨
function checkVictory() { /* no-op: bossClear handles end condition */ }

function initGame() {
  loopRunning = false;  // 이전 루프 완전 종료 보장
  upgrades = {
    rightFireRate: 0,
    rightPower: 0,
    magazine: 0,
    coinBonus: 0,
    maxHp: 0,
    hpRegen: 0,
    killTime: 0
  };
  magazineCost = 20;
  coinBonusCost = 100;
  hpUpCost = 80;
  regenCost = 100;
  missileDamageLevel = 0;
  missileCooldownLevel = 0;
  missileDamageCost = 100;
  missileCooldownCost = 80;
  killTimeCost = 150;
  missileDamage = 3;
  waveJumpCount = 0;
  
  hp = getMaxHp();
  ammoMax = 120 + upgrades.magazine * 20;
  ammo = ammoMax;
  rightAmmoMax = getRightMagazine();
  rightAmmo = rightAmmoMax;
  reloading = false; reloadTimer = 0;
  rightReloading = false; rightReloadTimer = 0;
  score = 0;
  let startMoney = 500 + (eggActivated ? 0 : permanentBonus);
  if(startMoney > MAX_START_MONEY) startMoney = MAX_START_MONEY;
  money = (debugMode ? 999999 : startMoney);

  wave = 1;
  killCountForRegen = 0;
  spawnTimer = 0;
  firing = false; rightFiring = false;
  lastFire = 0; lastRightFire = 0;
  bullets = []; enemies = []; sparks = []; explosions = []; coinParticles = [];
  muzzleFlash = 0; recoilOff = 0; shotCount = 0; screenShake = 0;
  missileCooldown = 0; missileReady = true;
  waveTimer = 0; waveAnnounceTimer = 0; waveAnnounceText = '';
  autoTurrets = []; autoTurretCount = 0;
  autoTurretDamageLevel = 0; autoTurretDamageCost = 400;
  bombDrops = [];
  bossSpawnedThisWave = false;
  shopOpen = false;
  document.getElementById('shop').classList.add('hidden');
  gameState = 'play';
}

function toggleDebugMode() {
  debugMode = !debugMode;
  const debugIndicator = document.getElementById('debug-indicator');
  if(debugMode) {
    debugIndicator.style.display = 'block';
    if(gameState === 'play') {
      money = 999999;
      hp = 999;
    }
  } else {
    debugIndicator.style.display = 'none';
    if(gameState === 'play') {
      initGame();
    }
  }
}

window.addEventListener('keydown', (e) => {
  if(e.code === 'Pause') {
    e.preventDefault();
    toggleDebugMode();
  }
});

function playSound(type) {
  if(actx.state !== 'running') return;
  const t = actx.currentTime;
  if(type === 'shot') {
    const buf = actx.createBuffer(1, actx.sampleRate * 0.09, actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*10);
    const noise = actx.createBufferSource(); noise.buffer = buf;
    const osc = actx.createOscillator(); osc.type='square';
    osc.frequency.setValueAtTime(140,t); osc.frequency.exponentialRampToValueAtTime(50,t+0.07);
    const g = actx.createGain(); g.gain.setValueAtTime(0.28,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
    noise.connect(g); osc.connect(g); g.connect(actx.destination);
    noise.start(t); noise.stop(t+0.09); osc.start(t); osc.stop(t+0.08);
  }
  if(type === 'shotRight') {
    const buf = actx.createBuffer(1, actx.sampleRate * 0.08, actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*12);
    const noise = actx.createBufferSource(); noise.buffer = buf;
    const osc = actx.createOscillator(); osc.type='sawtooth';
    osc.frequency.setValueAtTime(160,t); osc.frequency.exponentialRampToValueAtTime(60,t+0.06);
    const g = actx.createGain(); g.gain.setValueAtTime(0.25,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.07);
    noise.connect(g); osc.connect(g); g.connect(actx.destination);
    noise.start(t); noise.stop(t+0.08); osc.start(t); osc.stop(t+0.07);
  }
  if(type === 'hit') {
    const osc = actx.createOscillator(); osc.type='sawtooth';
    osc.frequency.setValueAtTime(300,t); osc.frequency.exponentialRampToValueAtTime(80,t+0.15);
    const g = actx.createGain(); g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
    osc.connect(g); g.connect(actx.destination); osc.start(t); osc.stop(t+0.15);
  }
  if(type === 'die') {
    for(let i=0;i<3;i++){
      const osc = actx.createOscillator(); osc.type='sawtooth';
      osc.frequency.setValueAtTime(200-i*40,t+i*0.12);
      osc.frequency.exponentialRampToValueAtTime(30,t+i*0.12+0.2);
      const g = actx.createGain(); g.gain.setValueAtTime(0.3,t+i*0.12); g.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.2);
      osc.connect(g); g.connect(actx.destination); osc.start(t+i*0.12); osc.stop(t+i*0.12+0.22);
    }
  }
  if(type === 'reload') {
    // 실제 총기 재장전 사운드: 탄창 배출 → 슬라이드 → 탄창 삽입 → 챔버링
    const makeMetalClick = (startTime, freq, dur, vol) => {
      const len = Math.floor(actx.sampleRate * dur);
      const buf = actx.createBuffer(1, len, actx.sampleRate);
      const d = buf.getChannelData(0);
      for(let i = 0; i < len; i++) {
        const env = Math.exp(-i / len * 28);
        d[i] = (Math.random() * 2 - 1) * env;
      }
      const src = actx.createBufferSource(); src.buffer = buf;
      const hp = actx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = freq * 0.5;
      const bp = actx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = freq; bp.Q.value = 1.2;
      const g = actx.createGain();
      g.gain.setValueAtTime(vol, startTime);
      g.gain.exponentialRampToValueAtTime(0.001, startTime + dur);
      src.connect(hp); hp.connect(bp); bp.connect(g); g.connect(actx.destination);
      src.start(startTime); src.stop(startTime + dur + 0.01);
    };
    const makeSlide = (startTime, dur, vol) => {
      const len = Math.floor(actx.sampleRate * dur);
      const buf = actx.createBuffer(1, len, actx.sampleRate);
      const d = buf.getChannelData(0);
      for(let i = 0; i < len; i++) {
        const env = Math.sin((i / len) * Math.PI) * 0.8 + 0.2 * Math.exp(-i / len * 5);
        d[i] = (Math.random() * 2 - 1) * env;
      }
      const src = actx.createBufferSource(); src.buffer = buf;
      const bp = actx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 2200; bp.Q.value = 0.8;
      const lp = actx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 4000;
      const g = actx.createGain();
      g.gain.setValueAtTime(vol, startTime);
      g.gain.exponentialRampToValueAtTime(0.001, startTime + dur);
      src.connect(bp); bp.connect(lp); lp.connect(g); g.connect(actx.destination);
      src.start(startTime); src.stop(startTime + dur + 0.01);
    };
    makeMetalClick(t,        900,  0.07, 0.5);   // 탄창 배출 클릭
    makeSlide     (t + 0.08, 0.14, 0.22);         // 탄창 빠지는 슬라이드
    makeMetalClick(t + 0.26, 1100, 0.07, 0.45);  // 새 탄창 삽입
    makeMetalClick(t + 0.34, 700,  0.06, 0.4);   // 삽입 둔탁한 타격음
    makeSlide     (t + 0.42, 0.09, 0.28);         // 슬라이드(노리쇠) 당김
    makeMetalClick(t + 0.52, 1500, 0.05, 0.5);   // 챔버링 완료 클릭
  }
  if(type === 'coin') {
    const osc = actx.createOscillator(); osc.type='sine';
    osc.frequency.setValueAtTime(880,t); osc.frequency.setValueAtTime(1100,t+0.05);
    const g = actx.createGain(); g.gain.setValueAtTime(0.18,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
    osc.connect(g); g.connect(actx.destination); osc.start(t); osc.stop(t+0.12);
  }
  if(type === 'missile') {
    const osc = actx.createOscillator(); osc.type='sine';
    osc.frequency.setValueAtTime(200,t); osc.frequency.exponentialRampToValueAtTime(800,t+0.3);
    const g = actx.createGain(); g.gain.setValueAtTime(0.4,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
    osc.connect(g); g.connect(actx.destination); osc.start(t); osc.stop(t+0.4);
  }
  if(type === 'waveUp') {
    // 레거시 웨이브 전환음 (원래 reload 비프음)
    const osc = actx.createOscillator(); osc.type='square';
    osc.frequency.setValueAtTime(600,t); osc.frequency.setValueAtTime(800,t+0.05);
    const g = actx.createGain(); g.gain.setValueAtTime(0.15,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    osc.connect(g); g.connect(actx.destination); osc.start(t); osc.stop(t+0.1);
  }
}

// 자동 터렛 발사음: 플레이어 왼쪽(shot)과 완전히 동일한 파형, 볼륨만 낮춤
function playAutoTurretSound() {
  if(actx.state !== 'running') return;
  const t = actx.currentTime;
  const buf = actx.createBuffer(1, actx.sampleRate * 0.09, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*10);
  const noise = actx.createBufferSource(); noise.buffer = buf;
  const osc = actx.createOscillator(); osc.type='square';
  osc.frequency.setValueAtTime(140,t); osc.frequency.exponentialRampToValueAtTime(50,t+0.07);
  const g = actx.createGain(); g.gain.setValueAtTime(0.09,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
  noise.connect(g); osc.connect(g); g.connect(actx.destination);
  noise.start(t); noise.stop(t+0.09); osc.start(t); osc.stop(t+0.08);
}

function spawnEnemy() {
  if(gameState !== 'play') return;
  const edge = Math.floor(Math.random()*3);
  let ex, ey;
  if(edge===0){ex=Math.random()*W; ey=-40;}
  else if(edge===1){ex=W+40; ey=Math.random()*H;}
  else{ex=-40; ey=Math.random()*H;}
  const spd = 0.3 + Math.min(1.8, wave*0.025) + Math.random()*0.2;
  const r = 16 + Math.random()*10;
  const hpVal = 1 + Math.floor(wave/5);
  enemies.push({x:ex, y:ey, r, spd, hp:hpVal, maxHp:hpVal, seed:Math.random()*100, frame:0});
}

function drawEnemy(e) {
  if(e.type === 'boss') { drawBoss(e); return; }
  e.frame++;
  ctx.save(); ctx.translate(e.x, e.y);
  ctx.strokeStyle = `rgba(255,${30+e.hp*20},0,0.9)`;
  ctx.lineWidth = 1.8; ctx.shadowColor = '#ff2200'; ctx.shadowBlur = 8;
  const sides = 6;
  ctx.beginPath();
  for(let i=0;i<sides;i++){
    const a=(i/sides)*Math.PI*2;
    const wobble = Math.sin(e.frame*0.18+e.seed+i)*3;
    const px=Math.cos(a)*(e.r+wobble);
    const py=Math.sin(a)*(e.r+wobble);
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.closePath(); ctx.stroke();
  ctx.fillStyle=`rgba(255,50,0,0.5)`;
  ctx.beginPath(); ctx.arc(0,0,e.r*0.35,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff1100'; ctx.shadowBlur=6;
  ctx.beginPath(); ctx.arc(-5,-4,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(5,-4,3,0,Math.PI*2); ctx.fill();
  ctx.restore();
  if(e.maxHp>1){
    const bw=e.r*2, bh=4;
    const bx=e.x-e.r, by=e.y-e.r-10;
    ctx.fillStyle='#300'; roundRect(ctx,bx,by,bw,bh,2); ctx.fill();
    ctx.fillStyle='#f30'; roundRect(ctx,bx,by,bw*(e.hp/e.maxHp),bh,2); ctx.fill();
  }
}

function drawBoss(e) {
  e.frame++;
  const pulse = Math.sin(e.frame * 0.06) * 4;
  ctx.save(); ctx.translate(e.x, e.y);

  // 외곽 링 (회전)
  ctx.save(); ctx.rotate(e.frame * 0.015);
  ctx.strokeStyle = `rgba(180,0,255,${0.4 + 0.3*Math.sin(e.frame*0.1)})`;
  ctx.lineWidth = 3; ctx.shadowColor = '#cc00ff'; ctx.shadowBlur = 20;
  ctx.beginPath();
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2;
    const r = e.r + 18 + pulse;
    i===0?ctx.moveTo(Math.cos(a)*r, Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
  }
  ctx.closePath(); ctx.stroke();
  ctx.restore();

  // 코어 본체 (팔각형)
  ctx.save(); ctx.rotate(-e.frame * 0.012);
  ctx.strokeStyle = `rgba(220,30,255,0.95)`;
  ctx.lineWidth = 2.5; ctx.shadowColor = '#ff00ff'; ctx.shadowBlur = 18;
  ctx.beginPath();
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2;
    const wobble = Math.sin(e.frame*0.12+e.seed+i)*5;
    const px=Math.cos(a)*(e.r+wobble);
    const py=Math.sin(a)*(e.r+wobble);
    i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
  }
  ctx.closePath(); ctx.stroke();
  ctx.restore();

  // 내부 코어
  const coreGrad = ctx.createRadialGradient(0,0,0,0,0,e.r*0.5);
  coreGrad.addColorStop(0, `rgba(255,100,255,0.9)`);
  coreGrad.addColorStop(1, `rgba(120,0,180,0.3)`);
  ctx.fillStyle = coreGrad; ctx.shadowColor='#ff00ff'; ctx.shadowBlur=30;
  ctx.beginPath(); ctx.arc(0,0,e.r*0.5+pulse*0.3,0,Math.PI*2); ctx.fill();

  // 눈
  ctx.fillStyle='#ffffff'; ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(-12,-8,6,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(12,-8,6,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff00ff';
  ctx.beginPath(); ctx.arc(-12,-8,3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(12,-8,3,0,Math.PI*2); ctx.fill();

  ctx.restore();

  // HP바 (넓게)
  const bw=e.r*3, bh=7;
  const bx=e.x-e.r*1.5, by=e.y-e.r-20;
  ctx.fillStyle='#300030'; roundRect(ctx,bx,by,bw,bh,3); ctx.fill();
  ctx.fillStyle='#cc00ff'; ctx.shadowColor='#ff00ff'; ctx.shadowBlur=8;
  roundRect(ctx,bx,by,bw*(e.hp/e.maxHp),bh,3); ctx.fill(); ctx.shadowBlur=0;

  // BOSS 라벨
  ctx.fillStyle='rgba(220,0,255,0.9)'; ctx.font='bold 11px monospace';
  ctx.textAlign='center'; ctx.shadowColor='#ff00ff'; ctx.shadowBlur=10;
  ctx.fillText(`BOSS  ${e.hp}/${e.maxHp}`, e.x, by-4);
  ctx.shadowBlur=0; ctx.textAlign='left';
}

function spawnExplosion(x,y,big){

function getTurretBase() { return { x: W/2, y: H - 60 + recoilOff }; }

function drawTurret(angle) {
  const { x: bx, y: by } = getTurretBase();
  ctx.fillStyle = '#1a1a1a'; ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(bx, by + 10); ctx.lineTo(bx - 40, by + 50); ctx.lineTo(bx + 40, by + 50);
  ctx.closePath(); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#222';
  roundRect(ctx, bx-50, by+48, 100, 14, 3); ctx.fill(); ctx.stroke();
  ctx.save(); ctx.translate(bx, by); ctx.rotate(angle);
  ctx.fillStyle = '#2a2a2a'; ctx.strokeStyle = '#444';
  roundRect(ctx, -28, -14, 56, 28, 6); ctx.fill(); ctx.stroke();
  ctx.fillStyle = '#1c1c1c'; ctx.strokeStyle = '#3a3a3a';
  roundRect(ctx, 20, -5, 60, 10, 2); ctx.fill(); ctx.stroke();
  for (let i=0; i<3; i++) { ctx.fillStyle = '#333'; roundRect(ctx, 28+i*14, -6, 5, 12, 1); ctx.fill(); }
  ctx.fillStyle = '#111'; ctx.strokeStyle = '#2a2a2a';
  roundRect(ctx, 76, -6, 10, 12, 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(83,0,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#222'; ctx.strokeStyle = '#3a3a3a';
  roundRect(ctx, -30, -18, 36, 36, 4); ctx.fill(); ctx.stroke();
  if (muzzleFlash > 0) {
    const fa = muzzleFlash / 8;
    ctx.save(); ctx.translate(86, 0);
    ctx.fillStyle = `rgba(255,230,100,${fa})`;
    ctx.shadowColor='#ffaa00'; ctx.shadowBlur = 24*fa;
    ctx.beginPath(); ctx.arc(0,0,11*fa+2,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  const mwx = bx + Math.cos(angle)*86;
  const mwy = by + Math.sin(angle)*86;
  ctx.restore();
  return { x:mwx, y:mwy, angle };
}

function fire(){
  const now=performance.now();
  if(now-lastFire<50) return;
  if(reloading||ammo<=0) return;
  lastFire=now;
  playSound('shot');
  muzzleFlash=7; ammo--; shotCount++; recoilOff=Math.min(recoilOff+2.5,8);
  screenShake=Math.max(screenShake,3);
  if(ammo<=0){ reloading=true; reloadTimer=70; playSound('reload'); }
  const {x:mx2,y:my2,angle:ang}=lastMuzzle;
  const spread=Math.min(shotCount*0.015,0.07);
  const fa=ang+(Math.random()-0.5)*spread*2;
  bullets.push({x:mx2,y:my2,vx:Math.cos(fa)*28,vy:Math.sin(fa)*28,life:1,trail:[],type:'left',damage:1});
  for(let i=0;i<3;i++) sparks.push({x:mx2,y:my2,vx:Math.cos(fa)*(10+Math.random()*5)+(Math.random()-0.5)*4,vy:Math.sin(fa)*(10+Math.random()*5)+(Math.random()-0.5)*4,life:1,size:1.5+Math.random()*2,type:'muzzle'});
}

function fireRight(){
  const now=performance.now();
  const fireDelay = getRightFireDelay();
  if(now-lastRightFire<fireDelay) return;
  if(rightReloading||rightAmmo<=0) return;
  lastRightFire=now;
  playSound('shotRight');
  muzzleFlash=10;
  recoilOff=Math.min(recoilOff+5,14);
  screenShake=Math.max(screenShake,5);
  rightAmmo--;
  const {x:mx2,y:my2,angle:ang}=lastMuzzle;
  const damage = getRightDamage();
  bullets.push({x:mx2,y:my2,vx:Math.cos(ang)*34,vy:Math.sin(ang)*34,life:1,trail:[],type:'right',damage:damage});
  for(let j=0;j<5;j++) sparks.push({x:mx2,y:my2,vx:Math.cos(ang)*(12+Math.random()*6)+(Math.random()-0.5)*5,vy:Math.sin(ang)*(12+Math.random()*6)+(Math.random()-0.5)*5,life:1,size:2+Math.random()*2.5,type:'muzzle'});
  
  if(rightAmmo<=0){ rightReloading=true; rightReloadTimer=100; playSound('reload'); }
}

function openShop(){
  if(gameState !== 'play') return;
  shopOpen=true;
  document.getElementById('shop').classList.remove('hidden');
  renderShop();
}
function closeShop(){ shopOpen=false; document.getElementById('shop').classList.add('hidden'); }

function canAfford(cost) { return debugMode || cheatMode || money >= cost; }
function spend(cost) { if(!debugMode && !cheatMode) money -= cost; }

function resetModes() {
  debugMode = false;
  cheatMode = false;
  eggActivated = false;
  donateClicked = false;
  document.getElementById('debug-indicator').style.display = 'none';
  document.getElementById('cheat-indicator').style.display = 'none';
  const eggCheat = document.getElementById('egg-cheat-btn');
  if(eggCheat) eggCheat.remove();
}

function bossClear() {
  enemies = [];
  bombDrops = [];
  screenShake = Math.max(screenShake, 20);

  // 보스 처치 = 게임 클리어 (디버그 제외, 치트모드는 정상 클리어로 판정)
  if(!debugMode) updatePermanentBonusFromMoney(money);
  gameState = 'dead';
  loopRunning = false;  // 루프 중복 실행 방지
  const bonusLine = debugMode
    ? `(디버그 모드 — 골드 적립 없음)`
    : cheatMode
      ? `보유 💰 ${money} → 시작 골드 +${Math.floor(money/1000)*100}💰 적립\n최종 시작 골드: +${permanentBonus}💰\n(치트 모드 — 다음 시작 골드는 반영 안됨)`
      : `보유 💰 ${money} → 시작 골드 +${Math.floor(money/1000)*100}💰 적립\n최종 시작 골드: +${permanentBonus}💰`;
  resetModes();
  playSound('die');
  document.getElementById('ovTitle').textContent = '✨ VICTORY! ✨';
  document.getElementById('ovMsg').textContent = `WAVE ${wave} BOSS DEFEATED!\n최종 SCORE: ${score}\n${bonusLine}`;
  document.getElementById('ovBtn').textContent = '[ RESTART ]';
  // 남은 적/파티클 제거
  enemies = []; bullets = []; sparks = []; explosions = []; coinParticles = []; bombDrops = [];
  document.getElementById('overlay').classList.remove('hidden');
}

function renderShop(){
  document.getElementById('shop-money').textContent=`💰 ${money}`;
  const itemsDiv=document.getElementById('shop-items');
  itemsDiv.innerHTML='';

  if(debugMode) {
    const resetDiv = document.createElement('div');
    resetDiv.style.cssText = 'border-bottom:1px solid #ff00ff; margin-bottom:10px; padding-bottom:8px; text-align:center;';
    resetDiv.innerHTML = `<button class="reset-btn" id="reset-bonus-btn">🗑️ 영구보너스 초기화</button>`;

function getAutoTurretPos(index) {
  const side = index % 2 === 0 ? -1 : 1;
  const rank = Math.floor(index / 2) + 1;
  return { x: W/2 + side * rank * 110, y: H };
}

function drawAutoTurret(turret) {
  const pos = getAutoTurretPos(turret.index);
  let angle = -Math.PI / 2;
  let closestDist = Infinity;
  for(let e of enemies) {
    const d = Math.hypot(e.x - pos.x, e.y - pos.y);
    if(d < closestDist) { closestDist = d; angle = Math.atan2(e.y - pos.y, e.x - pos.x); }
  }

  const S = 0.5; // 메인 터렛 대비 스케일
  const bx = pos.x, by = pos.y; // 바닥 기준

  ctx.save();
  ctx.translate(bx, by);

  // 삼각 받침 (메인: moveTo(0,10) lineTo(-40,50) lineTo(40,50) → *0.5, y축 반전해서 위로)
  ctx.fillStyle='#1a1a1a'; ctx.strokeStyle='#333'; ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(0, -5); ctx.lineTo(-20, -25); ctx.lineTo(20, -25);
  ctx.closePath(); ctx.fill(); ctx.stroke();

  // 하단 플레이트 (메인: roundRect(-50,48,100,14) → *0.5)
  ctx.fillStyle='#222'; ctx.strokeStyle='#333';
  roundRect(ctx, -25, -27, 50, 7, 2); ctx.fill(); ctx.stroke();

  // 포탑 (회전)
  ctx.save();
  ctx.translate(0, -30); // 포탑 중심 (받침 위)
  ctx.rotate(angle);

  // 포탑 본체 (메인: roundRect(-28,-14,56,28) → *0.5)
  ctx.fillStyle='#2a2a2a'; ctx.strokeStyle='#444'; ctx.lineWidth=1;
  roundRect(ctx, -14, -7, 28, 14, 3); ctx.fill(); ctx.stroke();

  // 포신 (메인: roundRect(20,-5,60,10) → *0.5)
  ctx.fillStyle='#1c1c1c'; ctx.strokeStyle='#3a3a3a';
  roundRect(ctx, 10, -2.5, 30, 5, 1); ctx.fill(); ctx.stroke();

  // 포신 홈 3개 (메인: 28+i*14, -6, 5, 12 → *0.5)
  for(let i=0; i<3; i++) { ctx.fillStyle='#333'; roundRect(ctx, 14+i*7, -3, 2.5, 6, 0.5); ctx.fill(); }

  // 포신 끝단 (메인: roundRect(76,-6,10,12) → *0.5)
  ctx.fillStyle='#111'; ctx.strokeStyle='#2a2a2a';
  roundRect(ctx, 38, -3, 5, 6, 1); ctx.fill(); ctx.stroke();
  ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(41.5, 0, 1.5, 0, Math.PI*2); ctx.fill();

  // 포탑 뒷 박스 (메인: roundRect(-30,-18,36,36) → *0.5)
  ctx.fillStyle='#222'; ctx.strokeStyle='#3a3a3a';
  roundRect(ctx, -15, -9, 18, 18, 2); ctx.fill(); ctx.stroke();

  // 머즐플래시 (발사 직후 turret.flash 있을 때)
  if(turret.flash > 0) {
    const fa = turret.flash / 8;
    ctx.save(); ctx.translate(43, 0);
    ctx.fillStyle = `rgba(255,230,100,${fa})`;
    ctx.shadowColor='#ffaa00'; ctx.shadowBlur = 12*fa;
    ctx.beginPath(); ctx.arc(0, 0, (5*fa+1), 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.restore();
    turret.flash--;
  }

  ctx.restore(); // 포탑 rotate 해제
  ctx.restore(); // translate 해제

  // 쿨다운 바
  const prog = turret.fireTimer / AUTO_TURRET_FIRE_DELAY;
  ctx.fillStyle='#111'; roundRect(ctx, bx-18, by-3, 36, 3, 1); ctx.fill();
  ctx.fillStyle = prog > 0.8 ? '#44ff88' : '#ff8800';
  roundRect(ctx, bx-18, by-3, 36*prog, 3, 1); ctx.fill();
}

function roundRect(ctx,x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath(); }

function drawHeart(ctx,x,y,size){
  const s=size/2;
  ctx.beginPath();
  ctx.moveTo(x+s,y+s*0.4);
  ctx.bezierCurveTo(x+s,y,x,y,x,y+s*0.4);
  ctx.bezierCurveTo(x,y+s*0.8,x+s*0.5,y+s*1.2,x+s,y+s*1.5);
  ctx.bezierCurveTo(x+s*1.5,y+s*1.2,x+s*2,y+s*0.8,x+s*2,y+s*0.4);
  ctx.bezierCurveTo(x+s*2,y,x+s,y,x+s,y+s*0.4);
  ctx.fill();
}

  }
  ctx.textAlign='left';
  ctx.fillStyle='#0f0'; ctx.font='bold 14px monospace';
  ctx.fillText(`WAVE ${wave}/${MAX_WAVE}`, 20, H-88);
  ctx.fillText(`SCORE ${score}`, 20, H-55);
  ctx.fillStyle='#ffdd00'; ctx.shadowColor='#ffaa00'; ctx.shadowBlur=5;
  ctx.fillText(`💰 ${money}`, 20, 60);
  if(permanentBonus > 0) {
    ctx.fillStyle='rgba(255,200,50,0.65)'; ctx.font='10px monospace'; ctx.shadowBlur=0;
    ctx.fillText(`✨ 시작 +${permanentBonus}💰`, 20, 76);
  }
  ctx.fillStyle='rgba(0,220,0,0.85)'; ctx.font='bold 12px monospace';
  ctx.fillText('[S] SHOP', 20, permanentBonus > 0 ? 92 : 80);
  ctx.shadowBlur=0;
  
  // 미사일 정보 (우측 상단)
  ctx.textAlign='right';
  ctx.fillStyle='#ff9944'; ctx.font='bold 13px monospace'; ctx.shadowColor='#ff6600'; ctx.shadowBlur=5;
  ctx.fillText(`💣 ${getMissileDamage()} DMG`, W-10, 28);

  ctx.textAlign='left';

  // 폭탄 힌트 — RMB 탄창 바로 위에 캔버스로 그리기
  if(missileReady && money >= 30 && !shopOpen) {
    const blinkAlpha = 0.5 + 0.45 * Math.sin(Date.now() / 220);
    ctx.textAlign='right'; ctx.font='bold 13px monospace';
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.fillText('[ SpaceBar ]  폭탄 사용  (💰30)', W-20+1, H-44+1);
    ctx.fillStyle=`rgba(0,255,120,${blinkAlpha})`;
    ctx.shadowColor='#00ff88'; ctx.shadowBlur=8+6*Math.sin(Date.now()/220);
    ctx.fillText('[ SpaceBar ]  폭탄 사용  (💰30)', W-20, H-44);
    ctx.shadowBlur=0;
  } else if(!missileReady) {
    let cdSec2 = Math.ceil((missileCooldown - performance.now()) / 1000);
    ctx.textAlign='right'; ctx.font='bold 13px monospace';
    ctx.fillStyle='rgba(180,80,0,0.8)';
    ctx.fillText(`[ 폭탄 쿨다운  ${cdSec2}s ]`, W-20, H-44);

  document.getElementById('missile-hint').classList.add('hidden');

  // 웨이브 진행 바 + 타이머 (하단 중앙)
  const fpw = getFramesPerWave();
  const waveProgress = waveTimer / fpw;
  const secLeft = Math.ceil((fpw - waveTimer) / 60);
  const barW = 260, barH = 8, barX = W/2 - barW/2, barY = 48;
  // 배경
  ctx.fillStyle='rgba(0,0,0,0.5)'; roundRect(ctx, barX-2, barY-2, barW+4, barH+4, 3); ctx.fill();
  // 트랙
  ctx.fillStyle='#111'; roundRect(ctx, barX, barY, barW, barH, 2); ctx.fill();
  // 진행
  const barColor = waveProgress > 0.8 ? '#ff6600' : '#0a0';
  ctx.fillStyle=barColor; roundRect(ctx, barX, barY, barW*waveProgress, barH, 2); ctx.fill();
  // 타이머 텍스트
  ctx.textAlign='center';
  ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.font='bold 13px monospace';
  ctx.fillText(`NEXT WAVE  ${secLeft}s`, W/2+1, barY-10+1);
  ctx.fillStyle = waveProgress > 0.8 ? '#ffaa44' : 'rgba(0,220,100,0.85)';
  ctx.shadowColor = waveProgress > 0.8 ? '#ff6600' : '#00ff88'; ctx.shadowBlur=6;
  ctx.fillText(`NEXT WAVE  ${secLeft}s`, W/2, barY-10);
  ctx.shadowBlur=0; ctx.textAlign='left';

  // 웨이브 알림
  if(waveAnnounceTimer > 0) {
    const alpha = Math.min(1, waveAnnounceTimer / 40);
    ctx.globalAlpha = alpha;
    ctx.fillStyle='#00ff88'; ctx.font='bold 36px monospace';
    ctx.textAlign='center'; ctx.shadowColor='#00ff88'; ctx.shadowBlur=20;
    ctx.fillText(waveAnnounceText, W/2, H/2 - 30);
    ctx.shadowBlur=0; ctx.textAlign='left'; ctx.globalAlpha=1;
  }
  
  for(let i=coinParticles.length-1;i>=0;i--){
    const p=coinParticles[i]; p.y+=p.vy; p.life-=0.025;
    if(p.life<=0){coinParticles.splice(i,1);continue;}
    ctx.globalAlpha=p.life; ctx.fillStyle='#ffdd00'; ctx.font='12px monospace';
    ctx.fillText(p.text, p.x, p.y); ctx.globalAlpha=1;
  }
}

function drawCrosshair(x,y){
  const spread=Math.min(shotCount*0.5,12);
  const gap=7+spread, len=11;
  ctx.save(); ctx.strokeStyle='rgba(0,255,80,0.92)'; ctx.lineWidth=1.5; ctx.shadowColor='#0f0'; ctx.shadowBlur=5;
  ctx.beginPath(); ctx.moveTo(x,y-gap); ctx.lineTo(x,y-gap-len); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x,y+gap); ctx.lineTo(x,y+gap+len); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-gap,y); ctx.lineTo(x-gap-len,y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x+gap,y); ctx.lineTo(x+gap+len,y); ctx.stroke();
  ctx.fillStyle='rgba(0,255,80,0.9)'; ctx.beginPath(); ctx.arc(x,y,1.5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

let lastMuzzle = {x:0,y:0,angle:0};

let loopRunning = false;

function loop(){
  // shopOpen일 때는 그냥 RAF만 걸고 대기 (게임 로직 스킵)
  if(shopOpen){ 
    if(gameState !== 'play'){ loopRunning = false; return; }
    requestAnimationFrame(loop); 
    return; 
  }
  // play 상태가 아니면 루프 중단 (loopRunning = false)
  if(gameState !== 'play'){ 
    loopRunning = false;
    return; 
  }

  if(debugMode) {
    if(hp < 999) hp = 999;
    if(money < 999999) money = 999999;
  }
  // 치트 모드 인디케이터
  const cheatIndicator = document.getElementById('cheat-indicator');
  if(cheatIndicator) cheatIndicator.style.display = cheatMode ? 'block' : 'none';

  recoilOff*=0.75;
  if(!firing) shotCount=Math.max(0,shotCount-0.5);
  if(muzzleFlash>0) muzzleFlash--;
  if(screenShake>0) screenShake*=0.8;
  if(missileCooldown>0){ 
    const now=performance.now();
    if(now >= missileCooldown){ missileCooldown=0; missileReady=true; }
  }
  if(waveAnnounceTimer>0) waveAnnounceTimer--;

  // 웨이브 자동 진행
  waveTimer++;
  if(waveTimer >= getFramesPerWave()) {
    waveTimer = 0;
    if(wave < MAX_WAVE) {
      wave++;
      bossSpawnedThisWave = false;
      enemies = []; bullets = [];
      waveAnnounceText = `WAVE ${wave}`;
      waveAnnounceTimer = 150;
      playSound('waveUp');
    }
  }

  // 보스 스폰 (wave >= MAX_WAVE, 일반/디버그 모두)
  if(wave >= MAX_WAVE && !bossSpawnedThisWave) {
    bossSpawnedThisWave = true;
    enemies = enemies.filter(e => e.type === 'boss'); // 잡몹 제거
    const bossHp = 150 + Math.max(0, wave - MAX_WAVE) * 60;
    enemies.push({
      x: W/2 + (Math.random()-0.5)*200, y: -80,
      r: 60, spd: 0.12,
      hp: bossHp, maxHp: bossHp,
      seed: Math.random()*100, frame: 0,
      type: 'boss'
    });
    waveAnnounceText = `⚠ BOSS WAVE ${wave} ⚠`;
    waveAnnounceTimer = 200;
  }

  if(reloading){ reloadTimer--; if(reloadTimer<=0){ reloading=false; ammo=ammoMax; playSound('reload'); } }
  if(rightReloading){ rightReloadTimer--; if(rightReloadTimer<=0){ rightReloading=false; rightAmmo=getRightMagazine(); playSound('reload'); } }

  spawnTimer++;
  let baseDelay = Math.max(65, 190 - wave * 3);
  if(spawnTimer>=baseDelay){
    spawnTimer=0;
    let enemyCount = 1;
    if(wave>25) enemyCount=3;
    else if(wave>15) enemyCount=2;
    for(let i=0;i<enemyCount;i++) spawnEnemy();
  }

  let sx=0,sy=0;
  if(screenShake>0){ sx=(Math.random()-0.5)*screenShake; sy=(Math.random()-0.5)*screenShake; }
  ctx.save(); ctx.translate(sx,sy);
  ctx.fillStyle='rgba(10,10,10,0.88)'; ctx.fillRect(-10,-10,W+20,H+20);

  const tx=W/2, ty=H-60;
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    const dx=tx-e.x, dy=ty-e.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    e.x+=dx/dist*e.spd; e.y+=dy/dist*e.spd;
    drawEnemy(e);
    if(dist<e.r+32){
      enemies.splice(i,1);
      if(!debugMode) {
        const dmg = e.type === 'boss' ? 3 : 1;
        hp -= dmg;
        screenShake=15;
        spawnExplosion(tx,ty,false);
        playSound('hit');
      }
      if(hp<=0 && !debugMode){ 
        gameState='dead';
        loopRunning = false;  // 루프 중복 실행 방지
        resetModes();
        playSound('die');
        updatePermanentBonusFromMoney(money);
        enemies = []; bullets = []; sparks = []; explosions = []; coinParticles = []; bombDrops = [];
        document.getElementById('ovTitle').textContent='GAME OVER';
        const bonusEarned = (wave >= 15 && score >= 400) ? Math.floor(money/1000)*100 : 0;
        const bonusMsg = (wave >= 15 && score >= 400)
          ? `\n💰 ${money} COIN → 시작 골드 +${bonusEarned}💰 적립\n최종 시작 골드: +${permanentBonus}💰`
          : wave >= 15
            ? `\n💰 ${money} COIN\n(스코어 400 미만 — 골드 적립 없음)`
            : `\n💰 ${money} COIN\n(웨이브 15 미만 — 골드 적립 없음)`;
        document.getElementById('ovMsg').textContent=`SCORE: ${score}  WAVE: ${wave}${bonusMsg}`;
        document.getElementById('ovBtn').textContent='[ RETRY ]';
        document.getElementById('overlay').classList.remove('hidden');
        ctx.restore();  // save() 대응
        return;  // 즉시 루프 종료, RAF 등록 안 함
      }
      continue;
    }
  }

  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.trail.push({x:b.x,y:b.y}); if(b.trail.length>10) b.trail.shift();
    b.x+=b.vx; b.y+=b.vy; b.life-=0.022;
    let hit=false;
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];
      if(Math.hypot(b.x-e.x,b.y-e.y)<e.r+4){
        e.hp -= b.damage;
        if(e.hp<=0){
          spawnExplosion(e.x,e.y,true);
          const earned = 1 + Math.floor(wave/4) + getCoinBonus();
          money += earned;
          score += Math.round(getKillTimeReduction() / 120);
          killCountForRegen++;
          // 킬마다 웨이브 타이머 가속 (잔여 1초 이하면 스킵)
          if(getFramesPerWave() - waveTimer > 60)
            waveTimer = Math.min(waveTimer + getKillTimeReduction(), getFramesPerWave() - 60);
          if(killCountForRegen>=10){
            killCountForRegen=0;
            let heal = getRegenHeal();
            if(!debugMode) hp = Math.min(getMaxHp(), hp + heal);
            else hp = 999;
          }
          spawnCoin(e.x,e.y,earned);
          playSound('coin');
          enemies.splice(j,1);
          if(e.type === 'boss') bossClear();
        } else spawnExplosion(b.x,b.y,false);
        hit=true; break;
      }
    }
    if(hit || b.x<-50 || b.x>W+50 || b.y<-50 || b.y>H+50 || b.life<=0){
      if(!hit) spawnExplosion(b.x,b.y,false);
      bullets.splice(i,1); continue;
    }
    if(b.trail.length>1){
      let grad; 
      if(b.type==='right'){
        grad=ctx.createLinearGradient(b.trail[0].x,b.trail[0].y,b.x,b.y);
        grad.addColorStop(0,'rgba(50,100,255,0)'); grad.addColorStop(0.6,'rgba(100,160,255,0.5)'); grad.addColorStop(1,'rgba(200,220,255,1)');
        ctx.shadowColor='#4488ff';
      } else if(b.type==='auto'){
        grad=ctx.createLinearGradient(b.trail[0].x,b.trail[0].y,b.x,b.y);
        grad.addColorStop(0,'rgba(255,100,0,0)'); grad.addColorStop(0.6,'rgba(255,180,30,0.5)'); grad.addColorStop(1,'rgba(255,255,180,1)');
        ctx.shadowColor='#ff8800';
      } else {
        grad=ctx.createLinearGradient(b.trail[0].x,b.trail[0].y,b.x,b.y);
        grad.addColorStop(0,'rgba(255,100,0,0)'); grad.addColorStop(0.6,'rgba(255,180,30,0.5)'); grad.addColorStop(1,'rgba(255,255,180,1)');
        ctx.shadowColor='#ff8800';
      }
      ctx.strokeStyle=grad; ctx.lineWidth=2.5; ctx.shadowBlur=8;
      ctx.beginPath(); ctx.moveTo(b.trail[0].x,b.trail[0].y);
      for(let k=1;k<b.trail.length;k++) ctx.lineTo(b.trail[k].x,b.trail[k].y);
      ctx.lineTo(b.x,b.y); ctx.stroke(); ctx.shadowBlur=0;
    }
  }

  for(let i=explosions.length-1;i>=0;i--){
    const ex=explosions[i]; ex.r+=4; ex.life-=0.08;
    if(ex.life<=0){explosions.splice(i,1);continue;}
    ctx.strokeStyle=`rgba(255,120,0,${ex.life})`; ctx.lineWidth=2; ctx.shadowColor='#ff4400'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(ex.x,ex.y,ex.r,0,Math.PI*2); ctx.stroke(); ctx.shadowBlur=0;
  }

  // 폭격 이펙트 처리
  for(let i=bombDrops.length-1; i>=0; i--){
    const b = bombDrops[i];
    // 딜레이 중이면 스킵
    if(b.delay > 0){ b.delay--; continue; }

    // 이동
    const dx = b.tx - b.x, dy = b.ty - b.y;
    const dist = Math.hypot(dx, dy);
    const spd = 28;
    b.x += dx/dist*spd; b.y += dy/dist*spd;
    b.trail.push({x:b.x, y:b.y});
    if(b.trail.length > 10) b.trail.shift();

    // 트레일 (불꽃 꼬리)
    for(let t=0; t<b.trail.length; t++){
      const alpha = (t/b.trail.length)*0.9;
      const sz = 1 + (t/b.trail.length)*4;
      ctx.fillStyle=`rgba(255,${180-t*12},0,${alpha})`;
      ctx.shadowColor='#ff6600'; ctx.shadowBlur=6;
      ctx.beginPath(); ctx.arc(b.trail[t].x, b.trail[t].y, sz, 0, Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur=0;

    // 폭탄 본체
    const angle = Math.atan2(dy, dx);
    ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(angle);
    ctx.fillStyle='#888888'; ctx.strokeStyle='#cccccc'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.ellipse(0, 0, 9, 5, 0, 0, Math.PI*2); ctx.fill(); ctx.stroke();
    // 꼬리 날개
    ctx.fillStyle='#aaaaaa';
    ctx.beginPath(); ctx.moveTo(-9,0); ctx.lineTo(-14,-5); ctx.lineTo(-14,5); ctx.closePath(); ctx.fill();
    // 앞 발광
    ctx.fillStyle='#ffee44'; ctx.shadowColor='#ffcc00'; ctx.shadowBlur=10;
    ctx.beginPath(); ctx.arc(9, 0, 3, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
    ctx.restore();

    // 착탄 판정
    if(dist < spd + 5){
      // 충격파 폭발 (큰 것 + 작은 것 겹치기)
      explosions.push({x:b.tx, y:b.ty, r:8, life:1});
      explosions.push({x:b.tx, y:b.ty, r:2, life:1.2});
      screenShake = Math.max(screenShake, 28);
      // 스파크 대량 발사
      for(let n=0; n<50; n++){
        const a=Math.random()*Math.PI*2, s=5+Math.random()*18;
        sparks.push({x:b.tx,y:b.ty,vx:Math.cos(a)*s,vy:Math.sin(a)*s - Math.random()*4,life:1,size:3+Math.random()*5,type:'big'});
      }
      // 파편 (위쪽으로 튀는 연기)
      for(let n=0; n<20; n++){
        const a=-Math.PI+Math.random()*Math.PI;
        const s=3+Math.random()*8;
        sparks.push({x:b.tx,y:b.ty,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,life:0.7+Math.random()*0.4,size:2+Math.random()*3,type:'small'});
      }

      // 범위 내 모든 적에게 피해
      for(let j=enemies.length-1; j>=0; j--){
        if(Math.hypot(enemies[j].x-b.tx, enemies[j].y-b.ty) < 90){
          enemies[j].hp -= b.damage;
          spawnExplosion(enemies[j].x, enemies[j].y, enemies[j].hp<=0);
          if(enemies[j].hp<=0){
            const earned=1+Math.floor(wave/4)+getCoinBonus();
            money+=earned; score += Math.round(getKillTimeReduction() / 120);
            killCountForRegen++;
            // 킬마다 웨이브 타이머 가속 (잔여 1초 이하면 스킵)
            if(getFramesPerWave() - waveTimer > 60)
              waveTimer=Math.min(waveTimer+getKillTimeReduction(), getFramesPerWave()-60);
            if(killCountForRegen>=10){ killCountForRegen=0; let heal=getRegenHeal(); if(!debugMode) hp=Math.min(getMaxHp(),hp+heal); else hp=999; }
            spawnCoin(enemies[j].x, enemies[j].y, earned);
            playSound('coin');
            const killedType = enemies[j].type;
            enemies.splice(j,1);
            if(killedType === 'boss') { bossClear(); break; }
          }
        }
      }
      playSound('hit');
      bombDrops.splice(i,1);
    }
  }
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i]; s.x+=s.vx; s.y+=s.vy; s.vy+=0.18; s.life-=0.055;
    if(s.life<=0){sparks.splice(i,1);continue;}
    const col=s.type==='big'?`rgba(255,${80+Math.random()*80},0,${s.life})`:s.type==='muzzle'?`rgba(255,220,80,${s.life})`:`rgba(255,60,0,${s.life})`;
    ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=4;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.size*s.life,0,Math.PI*2); ctx.fill(); ctx.shadowBlur=0;
  }

  const base=getTurretBase();
  const ang=Math.atan2(my-base.y, mx-base.x);
  lastMuzzle=drawTurret(ang);

  // 자동 터렛 처리
  for(let ti=0; ti<autoTurrets.length; ti++){
    const at = autoTurrets[ti];
    const pos = getAutoTurretPos(at.index);
    if(at.flash === undefined) at.flash = 0;
    at.fireTimer = Math.min(at.fireTimer + 1, AUTO_TURRET_FIRE_DELAY);
    drawAutoTurret(at);
    if(at.fireTimer >= AUTO_TURRET_FIRE_DELAY && enemies.length > 0){
      at.fireTimer = 0;
      let closest=null, closestDist=Infinity;
      for(let e of enemies){
        const d=Math.hypot(e.x-pos.x, e.y-pos.y);
        if(d<closestDist){ closestDist=d; closest=e; }
      }
      if(closest){
        const angle=Math.atan2(closest.y-pos.y, closest.x-pos.x);
        // 포신 끝 위치 (포탑 중심 기준)
        const turretCY = pos.y - 30;
        const muzzleX = pos.x + Math.cos(angle)*43;
        const muzzleY = turretCY + Math.sin(angle)*43;
        // 포신 끝 → 적 방향으로 재계산
        const dx2=closest.x-muzzleX, dy2=closest.y-muzzleY;
        const dist2=Math.hypot(dx2,dy2);
        bullets.push({x:muzzleX, y:muzzleY, vx:dx2/dist2*28, vy:dy2/dist2*28, life:1, trail:[], type:'auto', damage:getAutoTurretDamage()});
        at.flash = 8;
        playAutoTurretSound();
      }
    }
  }

  drawHUD();
  drawCrosshair(mx,my);
  const vg=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.9);
  vg.addColorStop(0,'rgba(0,0,0,0)'); vg.addColorStop(1,'rgba(0,0,0,0.4)');
  ctx.fillStyle=vg; ctx.fillRect(-10,-10,W+20,H+20);
  ctx.restore();

  if(firing) fire();
  if(rightFiring) fireRight();
  
  checkVictory();
  requestAnimationFrame(loop);
}

loadPermanentBonus();
// initGame()은 DEPLOY 버튼 클릭 시에만 호출됨

document.getElementById('saveBtn').addEventListener('click', saveProgress);
document.getElementById('loadBtn').addEventListener('click', () => {
  document.getElementById('loadFile').click();
});
document.getElementById('loadFile').addEventListener('change', (e) => {
  if(e.target.files[0]) loadProgress(e.target.files[0]);
  e.target.value = '';
});

function startLoop() {
  if(!loopRunning) {
    loopRunning = true;
    loop();
  }
}

document.getElementById('ovBtn').addEventListener('click',()=>{
  if(actx.state==='suspended') actx.resume();
  resetModes();
  initGame();
  document.getElementById('overlay').classList.add('hidden');
  startLoop();
});
document.getElementById('shop-close').addEventListener('click',closeShop);
document.getElementById('shop-giveup').addEventListener('click',()=>{
  const waveMsg = wave >= 15
    ? score >= 400
      ? `현재 웨이브가 15 이상입니다\n(💰 ${money} COIN → 시작 골드 +${Math.floor(money/1000)*100}💰 적립)`
      : `현재 웨이브가 15 이상이지만 스코어가 400 미만입니다\n(골드 적립 없음)`
    : `현재 웨이브가 15 미만입니다\n(골드 적립 없음)`;
  const ok = confirm(`포기하시겠습니까?\n\n확인을 누르면 패배처리됩니다\n\n${waveMsg}`);
  if(!ok) return;
  closeShop();
  updatePermanentBonusFromMoney(money);
  gameState = 'dead';
  loopRunning = false;
  resetModes();
  playSound('die');
  enemies = []; bullets = []; sparks = []; explosions = []; coinParticles = []; bombDrops = [];
  document.getElementById('ovTitle').textContent = 'GAME OVER';
  const bonusEarned = (wave >= 15 && score >= 400) ? Math.floor(money/1000)*100 : 0;
  const bonusMsg = (wave >= 15 && score >= 400)
    ? `\n💰 ${money} COIN → 시작 골드 +${bonusEarned}💰 적립\n최종 시작 골드: +${permanentBonus}💰`
    : wave >= 15
      ? `\n💰 ${money} COIN\n(스코어 400 미만 — 골드 적립 없음)`
      : `\n💰 ${money} COIN\n(웨이브 15 미만 — 골드 적립 없음)`;
  document.getElementById('ovMsg').textContent = `SCORE: ${score}  WAVE: ${wave}${bonusMsg}`;
  document.getElementById('ovBtn').textContent = '[ RETRY ]';
  document.getElementById('overlay').classList.remove('hidden');
});
window.addEventListener('mousemove',e=>{ mx=e.clientX; my=e.clientY; });
window.addEventListener('mousedown',e=>{
  if(gameState !== 'play') return;
  if(e.button===0){ if(actx.state==='suspended')actx.resume(); firing=true; shotCount=0; }
  if(e.button===2){ if(actx.state==='suspended')actx.resume(); if(!shopOpen) rightFiring=true; }
});
window.addEventListener('mouseup',e=>{
  if(e.button===0) firing=false;
  if(e.button===2) rightFiring=false;
});
window.addEventListener('mouseleave',()=>{ firing=false; rightFiring=false; });
window.addEventListener('keydown',e=>{
  if(e.key==='s'||e.key==='S'){ if(gameState==='play'){ if(shopOpen) closeShop(); else openShop(); } }
  if(e.key==='Escape'&&shopOpen) closeShop();
  if(e.code==='Space' && gameState==='play' && !shopOpen && missileReady && (debugMode || cheatMode || money>=30)){
    e.preventDefault();
    if(!debugMode && !cheatMode) money-=30;
    missileReady=false;
    missileCooldown = performance.now() + getMissileCooldownSecs() * 1000;
    const missileDmg = getMissileDamage();
    // 폭격 이펙트: 각 적 위치로 폭탄 투하
    const targets = [...enemies];
    targets.forEach((e2, idx) => {
      bombDrops.push({
        x: e2.x + (Math.random()-0.5)*60,
        y: -60,
        tx: e2.x + (Math.random()-0.5)*20,
        ty: e2.y,
        vx: 0, vy: 0,
        damage: missileDmg,
        trail: [],
        delay: idx * 5  // 폭탄마다 5프레임씩 간격
      });
    });
    playSound('missile');
  }
});

// 변수 사전 초기화 (게임은 DEPLOY 버튼 클릭 시 시작)
bullets = []; enemies = []; sparks = []; explosions = []; coinParticles = [];
autoTurrets = []; autoTurretCount = 0; bombDrops = [];
// loop는 DEPLOY 클릭 시 startLoop()로 시작됨
</script>
