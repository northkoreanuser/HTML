<!DOCTYPE html>
<html>
<head>
    <title>TERMINAL VELOCITY FPS</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; cursor: crosshair; }
        #hud {
            position: fixed; inset: 0; pointer-events: none;
            border: 20px solid transparent; transition: border 0.1s;
            font-family: 'Courier New', monospace; color: #ff1100;
        }
        .flash { border: 20px solid #ff1100 !important; }
        #stats { position: absolute; bottom: 20px; left: 20px; font-size: 20px; }
    </style>
</head>
<body>
    <div id="hud"><div id="stats">THREATS ELIMINATED: <span id="s">0</span></div></div>
    <canvas id="g"></canvas>

<script>
    const cvs = document.getElementById('g');
    const c = cvs.getContext('2d');
    const actx = new (window.AudioContext || window.webkitAudioContext)();
    let score = 0, shake = 0, frame = 0;
    let targets = [];

    // 1. 더 찢어지는 8-bit 오디오 (Bit-crushed 레이어 추가)
    function playDistortedShot() {
        const osc = actx.createOscillator();
        const noise = actx.createBufferSource();
        const g = actx.createGain();
        
        // 저해상도 노이즈 (찌릿한 질감)
        const b = actx.createBuffer(1, actx.sampleRate * 0.1, actx.sampleRate);
        const d = b.getChannelData(0);
        for (let i = 0; i < b.length; i++) d[i] = Math.random() > 0.5 ? 1 : -1; 

        noise.buffer = b;
        osc.type = 'square';
        osc.frequency.setValueAtTime(150, actx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(40, actx.currentTime + 0.1);

        g.gain.setValueAtTime(0.4, actx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + 0.1);

        noise.connect(g); osc.connect(g);
        g.connect(actx.destination);
        noise.start(); osc.start();
        noise.stop(actx.currentTime + 0.1); osc.stop(actx.currentTime + 0.1);
    }

    // 2. 기괴한 와이어프레임 적 (몬스터 형상)
    function drawMonster(x, y, size, seed) {
        c.beginPath();
        c.strokeStyle = `rgb(255, ${Math.random()*50}, 0)`;
        c.lineWidth = 1.5;
        // 기하학적으로 떨리는 외곽선
        for(let i=0; i<8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const off = (Math.sin(frame * 0.5 + seed) * 10);
            const px = x + Math.cos(angle) * (size + off);
            const py = y + Math.sin(angle) * (size + off);
            i === 0 ? c.moveTo(px, py) : c.lineTo(px, py);
        }
        c.closePath();
        c.stroke();
        // 안구/코어 부분
        c.fillStyle = '#ff1100';
        c.fillRect(x-2, y-2, 4, 4);
    }

    function update() {
        cvs.width = window.innerWidth; cvs.height = window.innerHeight;
        frame++;
        
        // 화면 흔들림 및 반전 효과 (Terrorcore 감성)
        let sx = (Math.random()-0.5) * shake;
        let sy = (Math.random()-0.5) * shake;
        c.setTransform(1, 0, 0, 1, sx, sy);
        if(shake > 0) shake *= 0.8;

        c.fillStyle = 'rgba(0,0,0,0.3)';
        c.fillRect(-100, -100, cvs.width+200, cvs.height+200);

        targets.forEach((t, i) => {
            t.y += t.speed;
            t.x += Math.sin(frame * 0.05 + t.seed) * 2; // 지그재그 이동
            drawMonster(t.x, t.y, t.r, t.seed);
            if (t.y > cvs.height + 100) targets.splice(i, 1);
        });

        // 60프레임마다 적 스폰
        if (frame % 40 === 0) targets.push({
            x: Math.random()*cvs.width, y: -50, 
            r: 25+Math.random()*20, speed: 3+Math.random()*5, seed: Math.random()*100
        });

        requestAnimationFrame(update);
    }

    window.onclick = (e) => {
        if (actx.state === 'suspended') actx.resume();
        playDistortedShot();
        shake = 40;
        
        // HUD 충격 효과
        document.getElementById('hud').classList.add('flash');
        setTimeout(() => document.getElementById('hud').classList.remove('flash'), 50);

        targets.forEach((t, i) => {
            if (Math.hypot(t.x - e.clientX, t.y - e.clientY) < t.r + 10) {
                score++;
                document.getElementById('s').innerText = score;
                targets.splice(i, 1);
            }
        });
    };

    update();
</script>
</body>
</html>
