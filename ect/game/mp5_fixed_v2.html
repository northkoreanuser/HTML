<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0a; overflow:hidden; cursor:none; font-family:'Courier New',monospace; }
  canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cvs = document.getElementById('c');
const ctx = cvs.getContext('2d');
const actx = new (window.AudioContext || window.webkitAudioContext)();

let W, H;
let mx = 400, my = 300;
let firing = false;
let frame = 0;
let lastFireTime = 0;
const FIRE_RATE = 75;

let bullets = [];
let sparks = [];
let muzzleFlash = 0;
let recoilOffset = 0;
let shotCount = 0;

function resize() {
  W = cvs.width = window.innerWidth;
  H = cvs.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── 총 기준점 (화면 하단 중앙 우측) ──
// 총은 항상 이 위치에 고정. 총구 끝 좌표를 계산해서 탄 발사.
function getGunBase() {
  return { x: W / 2 + 60, y: H - 60 + recoilOffset };
}

// MP5를 크로스헤어 방향으로 조준해서 그림
// 반환값: 총구 끝 월드 좌표
function drawGun() {
  const base = getGunBase();
  const dx = mx - base.x;
  const dy = my - base.y;
  const angle = Math.atan2(dy, dx);

  ctx.save();
  ctx.translate(base.x, base.y);
  ctx.rotate(angle);

  // ── 치수 (픽셀) ──
  // 총 전체 길이: 220px. 총구는 x=+160 지점.
  const BARREL_END = 160;   // 총구 끝 (로컬 x)
  const BARREL_START = 40;  // 총열 시작
  const BODY_START = -60;   // 총몸 시작 (개머리판 앞)

  // 개머리판
  ctx.fillStyle = '#1c1c1c';
  ctx.strokeStyle = '#3a3a3a';
  ctx.lineWidth = 1;
  roundRect(ctx, -100, -8, 50, 16, 3); ctx.fill(); ctx.stroke();
  // 개머리판 버트
  ctx.fillStyle = '#252525';
  roundRect(ctx, -102, -10, 8, 20, 2); ctx.fill(); ctx.stroke();

  // 총몸 (receiver)
  ctx.fillStyle = '#242424';
  ctx.strokeStyle = '#404040';
  roundRect(ctx, BODY_START, -10, 110, 20, 4); ctx.fill(); ctx.stroke();

  // 탄창 (아래로 내려옴, 총몸 중앙)
  ctx.fillStyle = '#1e1e1e';
  ctx.strokeStyle = '#3a3a3a';
  roundRect(ctx, -15, 10, 16, 38, 3); ctx.fill(); ctx.stroke();
  // 탄창 라인
  ctx.strokeStyle = '#444';
  ctx.lineWidth = 0.5;
  for(let i = 0; i < 4; i++) {
    ctx.beginPath(); ctx.moveTo(-13, 15 + i*8); ctx.lineTo(-1, 15 + i*8); ctx.stroke();
  }

  // 손잡이
  ctx.fillStyle = '#222';
  ctx.strokeStyle = '#3a3a3a';
  ctx.lineWidth = 1;
  roundRect(ctx, 5, 10, 16, 28, 3); ctx.fill(); ctx.stroke();

  // 총열
  ctx.fillStyle = '#1a1a1a';
  ctx.strokeStyle = '#383838';
  roundRect(ctx, BARREL_START, -6, BARREL_END - BARREL_START, 12, 2); ctx.fill(); ctx.stroke();

  // 총구 캡
  ctx.fillStyle = '#111';
  ctx.strokeStyle = '#333';
  roundRect(ctx, BARREL_END - 8, -7, 14, 14, 2); ctx.fill(); ctx.stroke();
  // 총구 구멍
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(BARREL_END + 2, 0, 3, 0, Math.PI*2); ctx.fill();

  // 총열 위 레일
  ctx.fillStyle = '#2e2e2e';
  roundRect(ctx, BODY_START, -13, 90, 4, 1); ctx.fill();

  // 조준기 (front sight)
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(BARREL_END - 20, -6); ctx.lineTo(BARREL_END - 20, -11); ctx.stroke();

  // 총구 플래시
  if (muzzleFlash > 0) {
    const fa = muzzleFlash / 8;
    ctx.save();
    ctx.translate(BARREL_END + 4, 0);
    // 코어
    ctx.fillStyle = `rgba(255,230,120,${fa})`;
    ctx.shadowColor = '#ffaa00';
    ctx.shadowBlur = 20 * fa;
    ctx.beginPath(); ctx.arc(0, 0, 10 * fa + 2, 0, Math.PI*2); ctx.fill();
    // 방사형 스파크
    ctx.strokeStyle = `rgba(255,180,60,${fa * 0.9})`;
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 7; i++) {
      const a = (i / 7) * Math.PI * 2;
      const r = (8 + Math.random() * 10) * fa;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r); ctx.stroke();
    }
    ctx.restore();
  }

  // 총구 끝 월드 좌표 계산 (rotate된 상태에서 로컬 (BARREL_END+4, 0) → 월드)
  const muzzleLocalX = BARREL_END + 4;
  const worldMuzzleX = base.x + Math.cos(angle) * muzzleLocalX;
  const worldMuzzleY = base.y + Math.sin(angle) * muzzleLocalX;

  ctx.restore();
  return { x: worldMuzzleX, y: worldMuzzleY, angle };
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function drawCrosshair(x, y) {
  const spread = Math.min(shotCount * 0.6, 14);
  const gap = 7 + spread;
  const len = 12;

  ctx.save();
  ctx.strokeStyle = 'rgba(0,255,80,0.9)';
  ctx.lineWidth = 1.5;
  ctx.shadowColor = '#00ff50';
  ctx.shadowBlur = 5;

  ctx.beginPath(); ctx.moveTo(x, y - gap); ctx.lineTo(x, y - gap - len); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y + gap); ctx.lineTo(x, y + gap + len); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x - gap, y); ctx.lineTo(x - gap - len, y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x + gap, y); ctx.lineTo(x + gap + len, y); ctx.stroke();

  ctx.fillStyle = 'rgba(0,255,80,0.9)';
  ctx.beginPath(); ctx.arc(x, y, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

function playShot() {
  const t = actx.currentTime;
  const buf = actx.createBuffer(1, actx.sampleRate * 0.1, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/d.length*9);
  const noise = actx.createBufferSource(); noise.buffer = buf;

  const osc = actx.createOscillator();
  osc.type = 'square';
  osc.frequency.setValueAtTime(160, t);
  osc.frequency.exponentialRampToValueAtTime(55, t + 0.08);

  const g = actx.createGain();
  g.gain.setValueAtTime(0.3, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.09);

  noise.connect(g); osc.connect(g); g.connect(actx.destination);
  noise.start(t); noise.stop(t + 0.1);
  osc.start(t); osc.stop(t + 0.09);
}

let lastMuzzle = { x: 0, y: 0, angle: 0 };

function fire() {
  const now = performance.now();
  if (now - lastFireTime < FIRE_RATE) return;
  lastFireTime = now;

  if (actx.state === 'suspended') actx.resume();
  playShot();
  muzzleFlash = 8;
  shotCount++;
  recoilOffset = Math.min(recoilOffset + 3, 12);

  const { x: mx0, y: my0, angle } = lastMuzzle;

  // 크로스헤어 방향 + 퍼짐
  const spread = Math.min(shotCount * 0.018, 0.09);
  const sp = (Math.random() - 0.5) * spread * 2;
  const finalAngle = angle + sp;

  const spd = 26;
  bullets.push({
    x: mx0, y: my0,
    vx: Math.cos(finalAngle) * spd,
    vy: Math.sin(finalAngle) * spd,
    life: 1.0,
    trail: [],
  });

  // 총구 스파크
  for (let i = 0; i < 4; i++) {
    sparks.push({
      x: mx0, y: my0,
      vx: Math.cos(finalAngle) * (10 + Math.random()*6) + (Math.random()-0.5)*4,
      vy: Math.sin(finalAngle) * (10 + Math.random()*6) + (Math.random()-0.5)*4,
      life: 1, size: 1.5 + Math.random()*2, type: 'muzzle'
    });
  }
}

function spawnImpact(x, y) {
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 5;
    sparks.push({ x, y, vx: Math.cos(a)*spd, vy: Math.sin(a)*spd, life: 1, size: 1.5 + Math.random()*2, type: 'impact' });
  }
}

function loop() {
  frame++;
  recoilOffset *= 0.78;
  if (!firing) shotCount = Math.max(0, shotCount - 0.4);
  if (muzzleFlash > 0) muzzleFlash--;

  // 배경
  ctx.fillStyle = 'rgba(10,10,10,0.88)';
  ctx.fillRect(0, 0, W, H);

  // 그리드
  ctx.strokeStyle = 'rgba(0,60,0,0.1)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke(); }
  for (let y = 0; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); }

  // 총 그리고 총구 좌표 받기
  lastMuzzle = drawGun();

  // 총알
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.trail.push({ x: b.x, y: b.y });
    if (b.trail.length > 12) b.trail.shift();
    b.x += b.vx; b.y += b.vy;
    b.life -= 0.025;

    if (b.trail.length > 1) {
      const grad = ctx.createLinearGradient(b.trail[0].x, b.trail[0].y, b.x, b.y);
      grad.addColorStop(0, 'rgba(255,100,0,0)');
      grad.addColorStop(0.6, 'rgba(255,180,30,0.5)');
      grad.addColorStop(1, 'rgba(255,255,180,1)');
      ctx.strokeStyle = grad;
      ctx.lineWidth = 2.5;
      ctx.shadowColor = '#ff8800';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.moveTo(b.trail[0].x, b.trail[0].y);
      for (let j = 1; j < b.trail.length; j++) ctx.lineTo(b.trail[j].x, b.trail[j].y);
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    if (b.x < 0 || b.x > W || b.y < 0 || b.y > H || b.life <= 0) {
      spawnImpact(b.x, b.y);
      bullets.splice(i, 1);
    }
  }

  // 스파크
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx; s.y += s.vy; s.vy += 0.2; s.life -= 0.07;
    if (s.life <= 0) { sparks.splice(i, 1); continue; }
    const col = s.type === 'muzzle' ? `rgba(255,220,80,${s.life})` : `rgba(255,80,0,${s.life})`;
    ctx.fillStyle = col;
    ctx.shadowColor = col; ctx.shadowBlur = 4;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.size * s.life, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  // 크로스헤어
  drawCrosshair(mx, my);

  // 비네트
  const vg = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H*0.9);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);

  if (firing) fire();
  requestAnimationFrame(loop);
}

window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
window.addEventListener('mousedown', () => { if (actx.state==='suspended') actx.resume(); firing = true; shotCount = 0; });
window.addEventListener('mouseup', () => { firing = false; shotCount = 0; });
window.addEventListener('mouseleave', () => { firing = false; });

loop();
</script>
</body>
</html>
