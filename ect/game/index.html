<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Auto Generated Links</title>
    <style>
        body { font-family: sans-serif; padding: 30px; counter-reset: link-counter; }
        .link-container { margin-bottom: 12px; }
        .special-link::before {
            counter-increment: link-counter;
            content: counter(link-counter) ". ";
            margin-right: 5px; color: #666;
        }
        .special-link { color: #007bff; cursor: pointer; text-decoration: underline; font-weight: bold; }
    </style>
</head>
<body>
    <h2>파일 리스트 (자동 생성됨)</h2>
    
    <div id="list-wrapper">
        <div class="link-container"><span class="special-link" data-url="Crosshair 1.html"></span></div><div class="link-container"><span class="special-link" data-url="Crosshair 2.html"></span></div><div class="link-container"><span class="special-link" data-url="Crosshair 3.html"></span></div><div class="link-container"><span class="special-link" data-url="Crosshair.html"></span></div><div class="link-container"><span class="special-link" data-url="mp5_fixed_v2.html"></span></div><div class="link-container"><span class="special-link" data-url="russian_roulette.html"></span></div><div class="link-container"><span class="special-link" data-url="turret_defense 2.html"></span></div><div class="link-container"><span class="special-link" data-url="turret_defense.html"></span></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const links = document.querySelectorAll('.special-link');
            links.forEach(link => {
                const url = link.getAttribute('data-url');
                // 이름이 비어있으면 파일명 그대로 사용
                if (!link.textContent.trim()) {
                    link.textContent = url;
                }

                link.onclick = async () => {
                    try {
                        const response = await fetch(url);
                        if (!response.ok) throw new Error('로드 실패');
                        const html = await response.text();
                        document.open();
                        document.write(html);
                        document.close();
                    } catch (e) {
                        alert('서버 환경에서 실행하세요.');
                    }
                };
            });
        });
    </script>
</body>
</html>
