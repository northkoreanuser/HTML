<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERRORCORE: TOTAL ANNIHILATION</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#000;color:#fff;font-family:'IBM Plex Mono',monospace;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;transition:filter 0.05s}
  canvas{position:fixed;inset:0;z-index:0;opacity:0.6}
  .ui{position:relative;z-index:10;text-align:center;width:100%;max-width:900px;padding:2rem;background:rgba(0,0,0,0.85);border:2px solid #ff1100;box-shadow: 0 0 30px rgba(255, 17, 0, 0.3)}
  .title{font-size:clamp(30px,8vw,80px);font-weight:700;letter-spacing:-0.05em;line-height:1;margin-bottom:10px;color:#fff;text-shadow:0 0 20px #ff1100}
  .status-row{display:flex;justify-content:space-between;font-size:12px;color:#ff1100;margin-bottom:1rem;font-weight:700;text-transform:uppercase}
  .timeline{width:100%;height:12px;background:#111;margin-bottom:1.5rem;position:relative;border:1px solid #333}
  .timeline-bar{height:100%;background:linear-gradient(90deg, #550000, #ff1100, #fff);width:0%;box-shadow:0 0 15px #ff1100}
  .step-rows{display:flex;flex-direction:column;gap:8px;margin-bottom:2rem}
  .step-grid{display:grid;grid-template-columns:repeat(16,1fr);gap:4px;flex:1}
  .step{height:10px;background:#1a1a1a;border:1px solid #333}
  .step.on{background:#666}
  .step.cur{background:#fff;box-shadow:0 0 15px #fff;transform:scaleY(1.5)}
  .step.cur.on{background:#ff1100;box-shadow:0 0 20px #ff1100}
  .controls{margin-bottom:1rem;display:flex;gap:10px;justify-content:center}
  .btn{font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;padding:15px 45px;background:#ff1100;border:none;color:#000;cursor:pointer;transition:0.1s;clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%)}
  .btn:hover{background:#fff;transform:scale(1.05) skewX(-5deg)}
  .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;font-size:10px;color:#666;text-align:left}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="ui" id="uiMain">
  <div class="title" id="title">TOTAL ANNIHILATION</div>
  <div class="status-row">
    <span id="bpmDisp">BPM: 220-400</span>
    <span id="secName">ENGINE STANDBY</span>
    <span id="varDisp">VARIATION: NONE</span>
  </div>
  <div class="timeline"><div class="timeline-bar" id="tlBar"></div></div>
  <div class="step-rows" id="stepRows"></div>
  <div class="controls">
    <button class="btn" id="playBtn">COMMENCE DESTRUCTION</button>
  </div>
  <div class="info-grid">
    <div>SYSTEM: WEB AUDIO API v3<br>ALGORITHM: CHAOTIC RECURSION</div>
    <div style="text-align:right">WARNING: EXTREME DB LEVELS<br>FRAGILE HARDWARE RISK</div>
  </div>
</div>

<script>
// --- 핵심 오디오 설정 ---
let baseBPM = 240;
let currentSTEP = 60 / baseBPM / 4;
const TOTAL_BARS = 256;

const ctx = new (window.AudioContext || window.webkitAudioContext)();
const mg = ctx.createGain();
const masterComp = ctx.createDynamicsCompressor();

// 하이엔드 리미팅: 모든 주파수를 압착하여 파괴적 질감 극대화
masterComp.threshold.value = -30;
masterComp.ratio.value = 20;
masterComp.attack.value = 0.0001;
masterComp.release.value = 0.01;

mg.gain.value = 1.8;
mg.connect(masterComp);
masterComp.connect(ctx.destination);

const analyser = ctx.createAnalyser();
analyser.fftSize = 512;
masterComp.connect(analyser);

// 웨이브쉐이퍼 가변 커브 (왜곡의 종류를 무작위화)
function getDistCurve(intensity) {
  const c = new Float32Array(44100);
  const type = Math.random();
  for (let i=0; i<44100; i++) {
    const x = (i*2)/44100-1;
    if (type > 0.5) c[i] = Math.tanh(x * intensity * 50); // Deep Saturation
    else c[i] = Math.sign(x) * (1 - Math.exp(-Math.abs(x * intensity * 20))); // Hard Clipping
  }
  return c;
}

const noiseBuf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
const nd = noiseBuf.getChannelData(0);
for(let i=0; i<nd.length; i++) nd[i] = Math.random() * 2 - 1;

// --- 진화된 악기 합성 엔진 ---

function terrorKick(t, intens, pitchMod = 1) {
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  const ds = ctx.createWaveShaper();
  ds.curve = getDistCurve(intens);

  o.frequency.setValueAtTime(600 * pitchMod, t);
  o.frequency.exponentialRampToValueAtTime(25, t + 0.12);
  
  g.gain.setValueAtTime(3.0, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);

  o.connect(ds).connect(g).connect(mg);
  o.start(t); o.stop(t + 0.25);

  // FX: Sub Layer
  const sub = ctx.createOscillator();
  const subG = ctx.createGain();
  sub.frequency.setValueAtTime(40, t);
  subG.gain.setValueAtTime(1.5, t);
  subG.gain.linearRampToValueAtTime(0, t + 0.15);
  sub.connect(subG).connect(mg);
  sub.start(t); sub.stop(t + 0.15);

  // Visuals
  renderVisualHit(intens);
}

function glitchPerc(t, type, intens) {
  const n = ctx.createBufferSource();
  n.buffer = noiseBuf;
  const f = ctx.createBiquadFilter();
  const g = ctx.createGain();

  if (type === 'snare') {
    f.type = 'bandpass'; f.frequency.value = 1200 * (1 + Math.random());
    g.gain.setValueAtTime(1.5 * intens, t);
  } else { // Hat
    f.type = 'highpass'; f.frequency.value = 7000 + (Math.random() * 5000);
    g.gain.setValueAtTime(0.7 * intens, t);
  }
  
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
  n.connect(f).connect(g).connect(mg);
  n.start(t); n.stop(t + 0.1);
}

// --- 무작위 변주 및 시퀀싱 엔진 ---

let playing = false;
let currentStep = 0;
let nextNoteTime = 0;
let variationMode = "STANDARD";

function schedule() {
  while (nextNoteTime < ctx.currentTime + 0.15) {
    const bar = Math.floor(currentStep / 16);
    const s = currentStep % 16;
    
    // 8마디마다 모드 변경
    if (s === 0 && bar % 8 === 0) {
      const modes = ["STANDARD", "SPEEDCORE", "GLITCH_DRILL", "POLYRHYTHM", "OFFBEAT_CHAOS"];
      variationMode = modes[Math.floor(Math.random() * modes.length)];
      document.getElementById('varDisp').textContent = `VARIATION: ${variationMode}`;
    }

    // BPM 유동적 변화 (가속/감속)
    if (variationMode === "SPEEDCORE") baseBPM = 350 + Math.sin(bar) * 50;
    else baseBPM = 220 + (bar % 4) * 20;
    currentSTEP = 60 / baseBPM / 4;
    document.getElementById('bpmDisp').textContent = `BPM: ${Math.round(baseBPM)}`;

    // 모드별 패턴 로직
    handlePattern(variationMode, s, bar, nextNoteTime);

    updateUI(currentStep);
    nextNoteTime += currentSTEP;
    currentStep++;
  }
  if (playing) requestAnimationFrame(schedule);
}

function handlePattern(mode, s, bar, t) {
  const intens = 1.0 + (bar / 100);
  
  switch(mode) {
    case "STANDARD":
      if ([0, 4, 8, 12].includes(s)) terrorKick(t, intens);
      if (s % 4 === 2) glitchPerc(t, 'snare', intens);
      if (s % 2 === 1) glitchPerc(t, 'hat', intens);
      break;

    case "SPEEDCORE":
      if (s % 2 === 0) terrorKick(t, intens * 0.8, 1.2);
      if (s % 2 === 1) glitchPerc(t, 'hat', 1.5);
      break;

    case "GLITCH_DRILL":
      if (s === 0 || s === 6 || s === 10) terrorKick(t, intens, 0.8);
      // 초고속 드릴 롤
      if (bar % 2 === 0 && s > 8) {
        for(let i=0; i<4; i++) glitchPerc(t + (i * currentSTEP/4), 'hat', 2);
      }
      if (s === 14) glitchPerc(t, 'snare', 2);
      break;

    case "POLYRHYTHM":
      if (s % 3 === 0) terrorKick(t, intens, 1.1);
      if (s % 5 === 0) glitchPerc(t, 'snare', 1.2);
      glitchPerc(t, 'hat', 0.5);
      break;

    case "OFFBEAT_CHAOS":
      if ([0, 3, 6, 9, 12, 15].includes(s)) terrorKick(t, intens, Math.random() + 0.5);
      if (Math.random() > 0.7) glitchPerc(t, 'snare', 1.5);
      break;
  }
}

// --- UI & 시각 효과 엔진 ---

function renderVisualHit(intens) {
  const flash = intens > 1.2;
  document.body.style.filter = flash ? `invert(1) contrast(200%)` : 'none';
  document.getElementById('title').style.transform = `scale(${1 + Math.random()*0.2}) skew(${(Math.random()-0.5)*20}deg)`;
  document.getElementById('uiMain').style.borderColor = flash ? '#fff' : '#ff1100';
  
  if (flash) {
    setTimeout(() => {
        document.body.style.filter = 'none';
        document.getElementById('title').style.transform = 'none';
    }, 50);
  }
}

const stepRows = document.getElementById('stepRows');
const ROWS = ['DRIVE', 'SIGNAL', 'CORE'];
ROWS.forEach(r => {
  const div = document.createElement('div'); div.className = 'step-grid';
  for(let i=0; i<16; i++) {
    const s = document.createElement('div'); s.className = 'step'; s.id = `${r}-${i}`;
    div.appendChild(s);
  }
  stepRows.appendChild(div);
});

function updateUI(step) {
  const s = step % 16;
  const bar = Math.floor(step / 16);
  document.getElementById('tlBar').style.width = `${((step % (TOTAL_BARS*16)) / (TOTAL_BARS*16)) * 100}%`;
  
  if (s === 0) {
    document.getElementById('secName').textContent = `BAR: ${bar} / SECTOR: ${Math.floor(bar/8)}`;
  }

  document.querySelectorAll('.step').forEach(el => {
    if (el.id.endsWith(`-${s}`)) el.classList.add('cur');
    else el.classList.remove('cur');
  });
}

const canvas = document.getElementById('cv');
const c = canvas.getContext('2d');
function draw() {
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  
  c.fillStyle = 'rgba(0,0,0,0.15)';
  c.fillRect(0, 0, canvas.width, canvas.height);

  const sliceWidth = canvas.width / data.length;
  let x = 0;

  for(let i=0; i<data.length; i++) {
    const v = data[i] / 128.0;
    const y = (v * canvas.height) / 2;
    
    c.fillStyle = `rgb(${data[i]+50}, 0, 0)`;
    c.fillRect(x, canvas.height - y, sliceWidth - 1, y);
    x += sliceWidth;
  }
  requestAnimationFrame(draw);
}
draw();

document.getElementById('playBtn').addEventListener('click', () => {
  if (!playing) {
    ctx.resume();
    playing = true;
    currentStep = 0;
    nextNoteTime = ctx.currentTime;
    schedule();
    document.getElementById('playBtn').textContent = "CEASE FIRE";
  } else {
    playing = false;
    document.getElementById('playBtn').textContent = "RE-ENGAGE";
  }
});
</script>
</body>
</html>
