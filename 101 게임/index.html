<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>101 게임</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #09090b;
  --surface: #111113;
  --surface2: #18181b;
  --border: #27272a;
  --border2: #3f3f46;
  --text: #fafafa;
  --muted: #71717a;
  --accent: #a78bfa;
  --accent2: #7c3aed;
  --player: #34d399;
  --ai: #f87171;
  --font: 'IBM Plex Mono', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* ── 오버레이 ── */
#overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 24px; z-index: 100;
  transition: opacity 0.4s;
}
#overlay.hidden { opacity: 0; pointer-events: none; }
.ov-label { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
.ov-title { font-size: clamp(32px, 8vw, 52px); font-weight: 600; color: var(--text); }
.ov-title span { color: var(--accent); }
.ov-rules {
  font-size: 12px; color: var(--muted);
  text-align: center; line-height: 2; max-width: 260px;
}
.ov-rules b { color: var(--accent); font-weight: 500; }
#startBtn {
  background: var(--accent2); color: #fff;
  border: none; border-radius: 3px;
  padding: 13px 36px;
  font-family: var(--font); font-size: 13px; font-weight: 500;
  letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; transition: background 0.15s, transform 0.1s;
}
#startBtn:hover { background: #6d28d9; }
#startBtn:active { transform: scale(0.97); }

/* ── 메인 레이아웃 ── */
#game { width: 100%; max-width: 480px; opacity: 0; transition: opacity 0.4s; }
#game.show { opacity: 1; }

/* 상단 바 */
.top-bar {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 20px;
}
.top-left { display: flex; flex-direction: column; gap: 2px; }
.turn-label { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }
.turn-val { font-size: 20px; font-weight: 600; color: var(--text); }

/* 뮤직 토글 */
.music-wrap { display: flex; align-items: center; gap: 8px; }
.music-wrap span { font-size: 11px; color: var(--muted); }
.toggle { position: relative; width: 36px; height: 20px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-track {
  position: absolute; inset: 0;
  background: var(--border2); border-radius: 20px;
  cursor: pointer; transition: background 0.2s;
}
.toggle input:checked + .toggle-track { background: var(--accent2); }
.toggle-track::after {
  content: ''; position: absolute;
  width: 14px; height: 14px; border-radius: 50%;
  background: #fff; top: 3px; left: 3px; transition: transform 0.2s;
}
.toggle input:checked + .toggle-track::after { transform: translateX(16px); }

/* 총합 게이지 */
.gauge-wrap { margin-bottom: 20px; }
.gauge-labels {
  display: flex; justify-content: space-between;
  font-size: 11px; color: var(--muted); margin-bottom: 6px;
}
.gauge-labels .cur { color: var(--accent); font-weight: 500; font-size: 13px; }
.gauge-bar {
  height: 6px; background: var(--border);
  border-radius: 6px; overflow: hidden;
}
.gauge-fill {
  height: 100%; background: var(--accent);
  border-radius: 6px; transition: width 0.4s ease;
}
.gauge-fill.danger { background: var(--ai); }

/* 숫자 버튼 */
.num-grid {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 8px; margin-bottom: 16px;
}
.num-btn {
  aspect-ratio: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--font); font-size: 16px; font-weight: 500;
  cursor: pointer;
  transition: all 0.12s;
}
.num-btn:hover:not(:disabled) {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(167,139,250,0.06);
  transform: translateY(-2px);
}
.num-btn:active:not(:disabled) { transform: translateY(0); }
.num-btn:disabled { opacity: 0.2; cursor: default; transform: none; }

/* 로그 */
.log-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px 16px;
  max-height: 200px;
  overflow-y: auto;
  margin-bottom: 12px;
  scroll-behavior: smooth;
}
.log-box:empty::before {
  content: '게임 로그가 여기에 표시됩니다';
  color: var(--muted); font-size: 12px;
}
.log-entry {
  font-size: 12px; line-height: 2;
  border-bottom: 1px solid var(--border);
  padding: 2px 0;
}
.log-entry:last-child { border-bottom: none; }
.log-entry.player { color: var(--player); }
.log-entry.ai     { color: var(--ai); }
.log-entry.system { color: var(--muted); font-size: 11px; }

/* AI 생각중 */
.thinking {
  font-size: 12px; color: var(--muted);
  text-align: center; min-height: 20px;
  margin-bottom: 8px; letter-spacing: 0.05em;
}

/* 결과 */
#result {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 28px 20px;
  text-align: center;
  display: none;
}
.result-label { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
.result-emoji { font-size: 40px; margin-bottom: 8px; }
.result-msg { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
.result-msg.win { color: var(--player); }
.result-msg.lose { color: var(--ai); }
.result-sub { font-size: 12px; color: var(--muted); margin-bottom: 20px; }
.restart-btn {
  padding: 10px 28px;
  background: transparent; border: 1px solid var(--border2);
  border-radius: 4px; color: var(--text);
  font-family: var(--font); font-size: 12px; cursor: pointer;
  transition: all 0.15s;
}
.restart-btn:hover { background: var(--surface2); border-color: var(--accent); color: var(--accent); }

/* scrollbar */
.log-box::-webkit-scrollbar { width: 4px; }
.log-box::-webkit-scrollbar-track { background: transparent; }
.log-box::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>
<body>

<div id="overlay">
  <div class="ov-label">Number Strategy Game</div>
  <div class="ov-title"><span>101</span> 게임</div>
  <div class="ov-rules">
    총합이 <b>101</b>에 먼저 도달하면 승리<br>
    매 턴 <b>1~10</b> 중 하나를 선택<br>
    AI는 최적 전략으로 대응합니다
  </div>
  <button id="startBtn">시작하기</button>
</div>

<div id="game">
  <div class="top-bar">
    <div class="top-left">
      <div class="turn-label">Turn</div>
      <div class="turn-val" id="turnVal">1</div>
    </div>
    <div class="music-wrap">
      <span>BGM</span>
      <label class="toggle">
        <input type="checkbox" id="musicToggle" checked>
        <div class="toggle-track"></div>
      </label>
    </div>
  </div>

  <div class="gauge-wrap">
    <div class="gauge-labels">
      <span>0</span>
      <span class="cur" id="totalVal">총합: 0</span>
      <span>101</span>
    </div>
    <div class="gauge-bar">
      <div class="gauge-fill" id="gaugeFill" style="width:0%"></div>
    </div>
  </div>

  <div class="num-grid" id="numGrid"></div>

  <div class="thinking" id="thinking"></div>

  <div class="log-box" id="logBox"></div>

  <div id="result">
    <div class="result-label">Game Over</div>
    <div class="result-emoji" id="resultEmoji"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="result-sub" id="resultSub"></div>
    <button class="restart-btn" id="restartBtn">다시 하기</button>
  </div>
</div>

<script>
// ── Web Audio API ──
let audioCtx = null;
let bgPlaying = false, bgNodes = null, bgTimerID = null;

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// 배경음악: 펑키한 베이스라인 + 퍼커션 루프 (약 4초 루프)
function startBgMusic() {
  if (bgPlaying) return;
  bgPlaying = true;
  scheduleBgLoop();
}

function stopBgMusic() {
  bgPlaying = false;
  if (bgTimerID) { clearTimeout(bgTimerID); bgTimerID = null; }
  if (bgNodes) {
    try { bgNodes.forEach(n => { if (n.stop) n.stop(); }); } catch(e) {}
    bgNodes = null;
  }
}

function scheduleBgLoop() {
  if (!bgPlaying) return;
  const ctx = getCtx();
  const loopDur = 4.0;
  const now = ctx.currentTime;
  const nodes = [];
  const masterGain = ctx.createGain();
  masterGain.gain.setValueAtTime(0.22, now);
  masterGain.connect(ctx.destination);

  // 베이스라인: A minor 느낌의 펑키 패턴
  const bassNotes = [
    {f:110, t:0.0, d:0.18}, {f:110, t:0.25, d:0.12},
    {f:130.8, t:0.5, d:0.18}, {f:110, t:0.75, d:0.12},
    {f:98,  t:1.0, d:0.18}, {f:110, t:1.25, d:0.12},
    {f:130.8, t:1.5, d:0.22}, {f:146.8, t:1.75, d:0.12},
    {f:110, t:2.0, d:0.18}, {f:110, t:2.25, d:0.12},
    {f:130.8, t:2.5, d:0.18}, {f:110, t:2.75, d:0.12},
    {f:98,  t:3.0, d:0.18}, {f:110, t:3.25, d:0.12},
    {f:164.8, t:3.5, d:0.18}, {f:146.8, t:3.75, d:0.12},
  ];
  bassNotes.forEach(({f, t, d}) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(f, now + t);
    g.gain.setValueAtTime(0, now + t);
    g.gain.linearRampToValueAtTime(0.5, now + t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, now + t + d);
    osc.connect(g); g.connect(masterGain);
    osc.start(now + t); osc.stop(now + t + d + 0.05);
    nodes.push(osc);
  });

  // 하이햇 패턴
  const hatTimes = [0, 0.25, 0.5, 0.75, 1.0, 1.25, 1.5, 1.75,
                    2.0, 2.25, 2.5, 2.75, 3.0, 3.25, 3.5, 3.75];
  hatTimes.forEach((t, i) => {
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let j = 0; j < data.length; j++) data[j] = (Math.random() * 2 - 1);
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const g = ctx.createGain();
    const vol = (i % 2 === 0) ? 0.12 : 0.06;
    g.gain.setValueAtTime(vol, now + t);
    g.gain.exponentialRampToValueAtTime(0.001, now + t + 0.04);
    const hpf = ctx.createBiquadFilter();
    hpf.type = 'highpass'; hpf.frequency.value = 8000;
    src.connect(hpf); hpf.connect(g); g.connect(masterGain);
    src.start(now + t); src.stop(now + t + 0.05);
    nodes.push(src);
  });

  // 킥드럼: 비트 1, 3
  [0, 1.0, 2.0, 3.0].forEach(t => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.frequency.setValueAtTime(150, now + t);
    osc.frequency.exponentialRampToValueAtTime(40, now + t + 0.15);
    g.gain.setValueAtTime(0.8, now + t);
    g.gain.exponentialRampToValueAtTime(0.001, now + t + 0.2);
    osc.connect(g); g.connect(masterGain);
    osc.start(now + t); osc.stop(now + t + 0.25);
    nodes.push(osc);
  });

  // 스네어: 비트 2, 4
  [0.5, 1.5, 2.5, 3.5].forEach(t => {
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.15, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let j = 0; j < data.length; j++) data[j] = (Math.random() * 2 - 1) * Math.exp(-j / (ctx.sampleRate * 0.06));
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.3, now + t);
    src.connect(g); g.connect(masterGain);
    src.start(now + t); src.stop(now + t + 0.2);
    nodes.push(src);
  });

  bgNodes = nodes;
  bgTimerID = setTimeout(() => {
    bgNodes = null;
    scheduleBgLoop();
  }, loopDur * 1000 - 30);
}

// 클릭음: 짧은 틱
function playClick() {
  const ctx = getCtx();
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(1200, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.04);
  g.gain.setValueAtTime(0.15, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
  osc.connect(g); g.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.06);
}

// 승리음
function playWin() {
  const ctx = getCtx();
  const notes = [523.25, 659.25, 783.99, 1046.5];
  notes.forEach((f, i) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(f, ctx.currentTime + i * 0.12);
    g.gain.setValueAtTime(0, ctx.currentTime + i * 0.12);
    g.gain.linearRampToValueAtTime(0.3, ctx.currentTime + i * 0.12 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.3);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(ctx.currentTime + i * 0.12);
    osc.stop(ctx.currentTime + i * 0.12 + 0.35);
  });
}

// 패배음
function playLose() {
  const ctx = getCtx();
  const notes = [392, 349.23, 311.13, 261.63];
  notes.forEach((f, i) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(f, ctx.currentTime + i * 0.15);
    g.gain.setValueAtTime(0, ctx.currentTime + i * 0.15);
    g.gain.linearRampToValueAtTime(0.25, ctx.currentTime + i * 0.15 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.35);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(ctx.currentTime + i * 0.15);
    osc.stop(ctx.currentTime + i * 0.15 + 0.4);
  });
}

// ── 뮤직 토글 ──
const musicToggle = document.getElementById('musicToggle');
musicToggle.addEventListener('change', () => {
  if (musicToggle.checked) startBgMusic();
  else stopBgMusic();
});

// ── 게임 로직 ──
let total = 0, turn = 1, gameOver = false;

function aiMove() {
  const targets = [2,13,24,35,46,57,68,79,90,101];
  for (const t of targets) {
    const m = t - total;
    if (m >= 1 && m <= 10) return m;
  }
  return Math.floor(Math.random() * 10) + 1;
}

function updateGauge() {
  const pct = Math.min(total / 101 * 100, 100);
  const fill = document.getElementById('gaugeFill');
  fill.style.width = pct + '%';
  fill.className = 'gauge-fill' + (pct > 80 ? ' danger' : '');
  document.getElementById('totalVal').textContent = '총합: ' + total;
  document.getElementById('turnVal').textContent  = turn;
}

function addLog(text, cls) {
  const box = document.getElementById('logBox');
  const d = document.createElement('div');
  d.className = 'log-entry ' + cls;
  d.textContent = text;
  box.appendChild(d);
  box.scrollTop = box.scrollHeight;
  playClick();
}

function setButtons(disabled) {
  document.querySelectorAll('.num-btn').forEach(b => b.disabled = disabled);
}

function showResult(win) {
  gameOver = true;
  setButtons(true);
  document.getElementById('thinking').textContent = '';
  const el = document.getElementById('result');
  document.getElementById('resultEmoji').textContent = win ? '🎉' : '💥';
  document.getElementById('resultMsg').textContent   = win ? '승리!' : 'AI 승리';
  document.getElementById('resultMsg').className     = 'result-msg ' + (win ? 'win' : 'lose');
  document.getElementById('resultSub').textContent   = `총 ${turn}턴 / 최종 합계 ${total}`;
  el.style.display = 'block';
  if (win) playWin(); else playLose();
}

function playGame(userVal) {
  if (gameOver) return;
  setButtons(true);

  total += userVal;
  updateGauge();
  addLog(`🧑 나: +${userVal} → 총합 ${total}`, 'player');

  if (total >= 101) { showResult(true); return; }

  document.getElementById('thinking').textContent = '🤖 AI 생각 중...';
  setTimeout(() => {
    const ai = aiMove();
    total += ai;
    updateGauge();
    document.getElementById('thinking').textContent = '';
    addLog(`🤖 AI: +${ai} → 총합 ${total}`, 'ai');

    if (total >= 101) { showResult(false); return; }

    turn++;
    updateGauge();
    setButtons(false);
  }, 800);
}

function initGame() {
  total = 0; turn = 1; gameOver = false;
  updateGauge();
  document.getElementById('logBox').innerHTML  = '';
  document.getElementById('result').style.display = 'none';
  document.getElementById('thinking').textContent = '';
  setButtons(false);
  addLog('게임 시작 — 먼저 101에 도달하면 승리!', 'system');
}

// 버튼 생성
const grid = document.getElementById('numGrid');
for (let i = 1; i <= 10; i++) {
  const b = document.createElement('button');
  b.className = 'num-btn'; b.textContent = i;
  b.addEventListener('click', () => playGame(i));
  grid.appendChild(b);
}

document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('game').classList.add('show');
  startBgMusic();
  initGame();
});

document.getElementById('restartBtn').addEventListener('click', initGame);
</script>
</body>
</html>
