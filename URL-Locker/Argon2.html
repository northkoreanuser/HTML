<html lang="ko">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/argon2-browser@1.18.0/dist/argon2-bundled.min.js"></script>
    <style>
        :root {
            --bg: #0d0f14;
            --surface: #161920;
            --surface2: #1e2230;
            --border: #2a2f42;
            --accent: #4fffb0;
            --accent-dim: #1a3d2e;
            --accent-glow: rgba(79, 255, 176, 0.15);
            --text: #e8ecf4;
            --text-dim: #6b7394;
            --red: #ff4f6a;
            --red-dim: #3d1a22;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'IBM Plex Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px 80px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 48px 48px;
            opacity: 0.3;
            pointer-events: none;
        }

        .wrapper {
            position: relative;
            width: 100%;
            max-width: 520px;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text);
        }

        .logo span { color: var(--accent); }

        .subtitle {
            font-size: 0.72rem;
            color: var(--text-dim);
            letter-spacing: 0.18em;
            text-transform: uppercase;
            margin-top: 6px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.6;
        }

        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-dim);

        .security-badge .dot {

            height: 6px;

            border-radius: 50%;

            50% { opacity: 0.3; }

        .field label {
            display: flex;

            font-size: 0.68rem;

        .field input {

            box-shadow: 0 0 0 3px var(--accent-glow);

            padding: 20px;
            margin-top: 24px;

            font-size: 0.65rem;

            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 10px;

            color: var(--accent);

            padding: 12px;
            background: var(--bg);
            border-radius: 8px;
            border: 1px solid var(--accent-dim);

        .result-url a {
            color: inherit;
            text-decoration: none;
        }
        .result-url a:hover { text-decoration: underline; }

        .qr-wrap {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }

        #qrcode {
            border-radius: 10px;
            border: 6px solid white;
        }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        /* ── 복호화 성공 미리보기: URL 숨김 ── */
        .decrypt-preview {
            margin-top: 24px;
            padding: 16px;
            background: var(--accent-dim);
            border: 1px solid rgba(79,255,176,0.25);
            border-radius: 12px;
        }

        .decrypt-preview .preview-label {
            font-size: 0.65rem;
            color: var(--accent);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        /* URL 텍스트 표시 안 함 — hidden 처리 */
        .decrypt-preview .preview-url {

        @keyframes shake {
            0%,100% { transform: translateX(0); }

            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }

        .shake { animation: shake 0.4s ease; }

        .field input.error {
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(255,79,106,0.15);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            color: var(--text-dim);
            font-size: 0.68rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .divider::before, .divider::after {

            height: 1px;
            background: var(--border);

        .footer {
            margin-top: 32px;

            line-height: 1.8;

        @keyframes fadeUp {

        }
        .card { animation: fadeUp 0.4s ease; }

        .copy-feedback {
            display: inline-block;
            transition: transform 0.1s;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header">
        <div class="logo">URL<span>LOCKER</span> 🔐</div>
        <div class="subtitle">Encrypted URL vault</div>
    </div>

    <div class="card">

        <!-- ── 암호화 모드 ── -->
        <div id="encryptSection" style="display:none">
            <div class="security-badge">
                <span class="dot"></span>
                AES-256-GCM · Argon2id
            </div>

            <div class="field">
                <label>🔗 URL</label>
                <input type="url" id="urlInput" placeholder="https://example.com/" autocomplete="off">
            </div>

            <div class="field">

                    <button class="toggle-vis" onclick="toggleVis('keyInput', this)" tabindex="-1">👁</button>
                </div>
                <div class="strength-bar" id="strengthBar">
                    <span class="seg"></span><span class="seg"></span>
                    <span class="seg"></span><span class="seg"></span>
                </div>
                <div class="strength-label" id="strengthLabel"></div>
            </div>

            <div class="field">
                <label>💡 HINT <span style="color:var(--text-dim);font-size:0.6rem;letter-spacing:0.06em;text-transform:none;margin-left:4px;">(선택사항 · 평문 저장)</span></label>
                <input type="text" id="hintInput" placeholder="키 힌트 입력 (없으면 비워두세요)" autocomplete="off">
            </div>

            <div class="kdf-info">
                <span class="icon">🛡</span>
                <span>키는 <strong>Argon2id</strong>으로 파생 — 브루트포스 저항</span>
            </div>

            <button class="btn-primary" id="lockBtn" onclick="handleEncrypt()">LOCK IT!</button>

            <div class="spinner-wrap" id="encryptSpinner">
                <div class="spinner"></div>
                <div class="spinner-label">키 파생 중</div>
                <div class="kdf-progress">Argon2id 처리 중...</div>
            </div>
        </div>

        <!-- ── 복호화 모드 ── -->
        <div id="decryptSection" style="display:none">
            <div class="security-badge">
                <span class="dot"></span>
                잠긴 URL 감지됨
            </div>

            <div id="hintBox" style="display:none;margin-bottom:20px;padding:12px 16px;background:var(--surface2);border:1px solid rgba(79,255,176,0.25);border-radius:10px;">
                <div style="font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--accent);margin-bottom:5px;">💡 HINT</div>
                <div id="hintText" style="font-size:0.85rem;color:var(--text);word-break:break-all;"></div>
            </div>

            <div class="field">
                <label>🔑 KEY</label>
                <div class="input-wrap">
                    <input type="password" id="decryptKeyInput" class="has-toggle"
                           placeholder="암호화에 사용한 KEY 입력" autocomplete="current-password">
                    <button class="toggle-vis" onclick="toggleVis('decryptKeyInput', this)" tabindex="-1">👁</button>
                </div>
            </div>

            <button class="btn-primary" id="unlockBtn" onclick="handleDecrypt()">UNLOCK</button>

            <div class="spinner-wrap" id="decryptSpinner">
                <div class="spinner"></div>
                <div class="spinner-label">복호화 중</div>
                <div class="kdf-progress">키 파생 + 인증 확인...</div>
            </div>
        </div>

        <!-- ── 암호화 결과 ── -->
        <div id="resultSection" style="display:none">
            <div class="result-label">🔒 암호화된 URL</div>
            <div class="result-url" id="encryptedUrlDisplay"></div>

            <div class="qr-wrap">
                <img id="qrcode" width="180" height="180" alt="QR Code">
            </div>

            <div class="btn-row">
                <button class="btn-secondary" onclick="copyEncrypted()">📋 URL 복사</button>
                <button class="btn-secondary" onclick="downloadQR()">⬇ QR 저장</button>
                <button class="btn-secondary" onclick="resetAll()">↺ 새로 만들기</button>
            </div>
        </div>

    </div><!-- /card -->

    <div class="footer">
        모든 암호화는 <strong>브라우저 내</strong>에서 처리됩니다.<br>
        키나 원본 URL은 서버로 전송되지 않습니다.<br>
        <strong>Argon2id</strong> → <strong>AES-256-GCM</strong> (인증된 암호화)
    </div>
</div><!-- /wrapper -->

<script>
// ────────────────────────────────────────────────
//  설정
// ────────────────────────────────────────────────
const SALT_LEN  = 16;
const IV_LEN    = 12;
const enc = new TextEncoder();
const dec = new TextDecoder();

// Argon2id 파라미터 (OWASP 권장)
const ARGON2_MEM         = 65536; // 64MB
const ARGON2_TIME        = 3;
const ARGON2_PARALLELISM = 1;
const ARGON2_HASHLEN     = 32;    // 256-bit → AES-256 키

// 복호화 후 리다이렉트할 페이지 (잠금 마커 감지 시에도 동일)
const FALLBACK_URL = 'https://youtu.be/EWjw8MSmKi4?t=0';

let _encryptedUrl = '';

// ────────────────────────────────────────────────
//  키 파생: Argon2id
// ────────────────────────────────────────────────
async function deriveKey(password, salt) {
    const result = await argon2.hash({
        pass: password,
        salt: salt,
        type: argon2.ArgonType.Argon2id,
        mem:  ARGON2_MEM,
        time: ARGON2_TIME,
        parallelism: ARGON2_PARALLELISM,
        hashLen: ARGON2_HASHLEN,
    });

    return crypto.subtle.importKey(
        'raw',
        result.hash,
        { name: 'AES-GCM', length: 256 },
        false,
        ['encrypt', 'decrypt']
    );
}

// ────────────────────────────────────────────────
//  암호화: AES-256-GCM
//  포맷: salt(16) || iv(12) || ciphertext+tag
// ────────────────────────────────────────────────
async function encryptAES(plaintext, password) {
    const salt = crypto.getRandomValues(new Uint8Array(SALT_LEN));
    const iv   = crypto.getRandomValues(new Uint8Array(IV_LEN));
    const key  = await deriveKey(password, salt);

    const cipherbuf = await crypto.subtle.encrypt(
        { name: 'AES-GCM', iv },
        key,
        enc.encode(plaintext)
    );

    const out = new Uint8Array(SALT_LEN + IV_LEN + cipherbuf.byteLength);
    out.set(salt, 0);
    out.set(iv,   SALT_LEN);
    out.set(new Uint8Array(cipherbuf), SALT_LEN + IV_LEN);

    return btoa(String.fromCharCode(...out))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

// ────────────────────────────────────────────────
//  복호화
// ────────────────────────────────────────────────
async function decryptAES(encoded, password) {
    const b64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
    const pad = (4 - b64.length % 4) % 4;
    const raw = Uint8Array.from(atob(b64 + '='.repeat(pad)), c => c.charCodeAt(0));

    const salt       = raw.slice(0, SALT_LEN);
    const iv         = raw.slice(SALT_LEN, SALT_LEN + IV_LEN);
    const ciphertext = raw.slice(SALT_LEN + IV_LEN);

    const key = await deriveKey(password, salt);

    const plainbuf = await crypto.subtle.decrypt(
        { name: 'AES-GCM', iv },
        key,
        ciphertext
    );

    return dec.decode(plainbuf);
}

// ────────────────────────────────────────────────
//  UI: 암호화
// ────────────────────────────────────────────────
async function handleEncrypt() {
    const url = document.getElementById('urlInput').value.trim();
    const key = document.getElementById('keyInput').value;

    if (!url || !key) { alert('URL과 KEY를 모두 입력하세요.'); return; }
    if (!isValidUrl(url)) { alert('올바른 URL 형식을 입력하세요.'); return; }

    setEncryptLoading(true);
    try {
        const hash = await encryptAES(url, key);
        const hint = document.getElementById('hintInput').value.trim();
        const base = window.location.href.split('?')[0];
        _encryptedUrl = `${base}?hash=${hash}` + (hint ? `&hint=${encodeURIComponent(hint)}` : '');

        document.getElementById('encryptSection').style.display = 'none';
        document.getElementById('resultSection').style.display = 'block';
        document.getElementById('encryptedUrlDisplay').innerHTML =
            `<a href="${_encryptedUrl}" target="_blank" rel="noopener noreferrer">${_encryptedUrl}</a>`;

        QRCode.toDataURL(_encryptedUrl, { errorCorrectionLevel: 'H', width: 180 }, (err, dataUrl) => {
            if (!err) document.getElementById('qrcode').src = dataUrl;
        });
    } catch (e) {
        alert('암호화 중 오류가 발생했습니다.');
    }
    setEncryptLoading(false);
}

function setEncryptLoading(on) {
    const btn = document.getElementById('lockBtn');
    const sp  = document.getElementById('encryptSpinner');
    btn.style.display = on ? 'none' : 'block';
    sp.classList.toggle('active', on);
}

// ────────────────────────────────────────────────
//  보안 상태
// ────────────────────────────────────────────────
let _failCount = 0;

let _blasting = false;
function _blastOff() {
    if (_blasting) return;
    _blasting = true;
    history.replaceState(null, '', window.location.pathname);
    window.location.replace(FALLBACK_URL);
}

// ────────────────────────────────────────────────
//  UI: 복호화
// ────────────────────────────────────────────────
async function handleDecrypt() {
    const key = document.getElementById('decryptKeyInput').value;
    if (!key) return;

    if (!_savedHash) return;

    setDecryptLoading(true);
    const keyInput = document.getElementById('decryptKeyInput');
    keyInput.classList.remove('error');

    try {
        const decrypted = await decryptAES(_savedHash, key);
        history.replaceState(null, '', window.location.pathname);
        window.location.replace(decrypted);

    } catch (e) {
        _failCount++;
        if (_failCount >= 1) {
            _blastOff();
            return;
        }
        keyInput.classList.add('error');
        keyInput.classList.remove('shake');
        void keyInput.offsetWidth;
        keyInput.classList.add('shake');
        keyInput.value = '';
        setTimeout(() => keyInput.classList.remove('error'), 1500);
    }
    setDecryptLoading(false);
}

function setDecryptLoading(on) {
    const btn = document.getElementById('unlockBtn');
    const sp  = document.getElementById('decryptSpinner');
    btn.style.display = on ? 'none' : 'block';
    sp.classList.toggle('active', on);
}

// ────────────────────────────────────────────────
//  기타 UI
// ────────────────────────────────────────────────
function copyEncrypted() {
    navigator.clipboard.writeText(_encryptedUrl).then(() => {
        flashBtn(event.target, '✅ 복사됨');
    });
}

function downloadQR() {
    const img = document.getElementById('qrcode');
    if (!img.src) return;
    const a = document.createElement('a');
    a.href = img.src;
    a.download = 'url-locker-qr.png';
    a.click();
}

function resetAll() {
    document.getElementById('resultSection').style.display = 'none';
    document.getElementById('encryptSection').style.display = 'block';
    document.getElementById('urlInput').value = '';
    document.getElementById('keyInput').value = '';
    document.getElementById('hintInput').value = '';
    document.getElementById('strengthBar').className = 'strength-bar';
    document.getElementById('strengthLabel').textContent = '';
    _encryptedUrl = '';
}

function toggleVis(inputId, btn) {
    const input = document.getElementById(inputId);
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    btn.textContent = isText ? '👁' : '🙈';
}

function flashBtn(btn, label) {
    const orig = btn.textContent;
    btn.textContent = label;
    setTimeout(() => { btn.textContent = orig; }, 1500);
}

function isValidUrl(str) {
    try { return ['http:', 'https:'].includes(new URL(str).protocol); }
    catch { return false; }
}

// ────────────────────────────────────────────────
//  비밀번호 강도
// ────────────────────────────────────────────────
function calcStrength(pw) {
    if (!pw) return 0;
    let score = 0;
    if (pw.length >= 8)  score++;
    if (pw.length >= 14) score++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
    if (/\d/.test(pw) && /[^A-Za-z0-9]/.test(pw)) score++;
    return Math.min(score, 4);
}

const labels = ['', '취약', '보통', '양호', '강함'];
document.getElementById('keyInput').addEventListener('input', function() {
    const s = calcStrength(this.value);
    const bar = document.getElementById('strengthBar');
    const lbl = document.getElementById('strengthLabel');
    bar.className = 'strength-bar' + (s ? ` s${s}` : '');
    lbl.textContent = this.value ? labels[s] : '';
});

// ────────────────────────────────────────────────
//  엔터 키
// ────────────────────────────────────────────────
['urlInput', 'keyInput'].forEach(id => {
    document.getElementById(id)?.addEventListener('keydown', e => {

    });

document.getElementById('decryptKeyInput')?.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); handleDecrypt(); }
});

// ────────────────────────────────────────────────
//  페이지 초기화: 모드 감지
// ────────────────────────────────────────────────

let _savedHash = null;

// ────────────────────────────────────────────────
//  보안 리스너 (잠금/복호화 모드 공통)
// ────────────────────────────────────────────────
function _attachSecurityListeners() {
    document.addEventListener('visibilitychange', () => {
        if (document.hidden) _blastOff();
    });

    window.addEventListener('blur', () => _blastOff());

    document.addEventListener('contextmenu', e => {
        e.preventDefault();
        e.stopPropagation();
        _blastOff();
    });

    document.addEventListener('keydown', e => {
        const c    = e.key.toUpperCase();
        const ctrl = e.ctrlKey || e.metaKey;

        if (e.key === 'F12') { e.preventDefault(); _blastOff(); return; }
        if (ctrl && e.shiftKey && ['I','J','C','K','E'].includes(c)) { e.preventDefault(); _blastOff(); return; }
        if (ctrl && ['U','S','P'].includes(c)) { e.preventDefault(); _blastOff(); return; }
        if (ctrl && ['A','F'].includes(c))     { e.preventDefault(); return; }
        if (e.key === 'F6')                    { e.preventDefault(); _blastOff(); return; }
    }, true);

    document.addEventListener('selectstart', e => e.preventDefault());
    document.addEventListener('dragstart',   e => e.preventDefault());

    const _devtoolsCheck = setInterval(() => {
        if (window.outerWidth  - window.innerWidth  > 160 ||
            window.outerHeight - window.innerHeight > 160) {
            clearInterval(_devtoolsCheck);
            _blastOff();
        }
    }, 500);

    (function _devtoolsTiming() {
        const start = performance.now();
        debugger; // eslint-disable-line no-debugger
        if (performance.now() - start > 100) { _blastOff(); return; }
        setTimeout(_devtoolsTiming, 1000);
    })();
}

(function init() {
    const params = new URLSearchParams(window.location.search);
    const hash   = params.get('hash');
    const hint   = params.get('hint');
    const marker = params.get('v');
    const lock   = params.get('lock');

    // ── [F5 감지] 마커 파라미터 → FALLBACK_URL 으로 추방
    if (marker === '1') {
        history.replaceState(null, '', window.location.pathname);
        window.location.replace(FALLBACK_URL);
        return;
    }

    // ── 복호화 모드: ?hash=...
    if (hash) {
        _savedHash = hash;
        history.replaceState(null, '', '?v=1');

        document.getElementById('decryptSection').style.display = 'block';
        document.title = 'URL LOCKED 🔐';
        document.querySelector('.logo').innerHTML = 'URL<span>LOCKED</span> 🔐';
        document.querySelector('.subtitle').textContent = 'Decrypt & access your URL';

        if (hint) {
            document.getElementById('hintBox').style.display = 'block';
            document.getElementById('hintText').textContent = hint;
        }

        _attachSecurityListeners();
        return;
    }

    // ── 잠금 모드: ?lock=1 필수 — 없으면 추방
    if (lock === '1') {
        history.replaceState(null, '', '?lock=1');
        document.getElementById('encryptSection').style.display = 'block';
        return;
    }

    // ── 파라미터 없음 → 추방
    _blastOff();
})();
</script>
