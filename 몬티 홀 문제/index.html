<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>몬티 홀 문제</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #09090b;
  --surface:  #111113;
  --surface2: #18181b;
  --border:   #27272a;
  --border2:  #3f3f46;
  --text:     #fafafa;
  --muted:    #71717a;
  --accent:   #a78bfa;
  --accent2:  #7c3aed;
  --green:    #34d399;
  --red:      #f87171;
  --yellow:   #fbbf24;
  --font:     'IBM Plex Mono', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}

/* ── 오버레이 ── */
#overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 20px; z-index: 100;
  transition: opacity 0.4s;
}
#overlay.hidden { opacity: 0; pointer-events: none; }
.ov-label  { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); }
.ov-title  { font-size: clamp(28px, 7vw, 46px); font-weight: 600; color: var(--text); }
.ov-title span { color: var(--accent); }
.ov-desc {
  font-size: 12px; color: var(--muted);
  text-align: center; line-height: 2; max-width: 280px;
}
.ov-desc b { color: var(--accent); font-weight: 500; }
#startBtn {
  background: var(--accent2); color: #fff;
  border: none; border-radius: 3px;
  padding: 13px 36px;
  font-family: var(--font); font-size: 13px; font-weight: 500;
  letter-spacing: 0.08em; text-transform: uppercase;
  cursor: pointer; transition: background 0.15s, transform 0.1s;
  margin-top: 4px;
}
#startBtn:hover  { background: #6d28d9; }
#startBtn:active { transform: scale(0.97); }

/* ── 메인 카드 ── */
#game {
  width: 100%; max-width: 480px;
  opacity: 0; transition: opacity 0.4s;
}
#game.show { opacity: 1; }

/* 헤더 */
.top-bar {
  display: flex; align-items: flex-end;
  justify-content: space-between; margin-bottom: 24px;
}
.title-block .game-label { font-size: 10px; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 3px; }
.title-block .game-title { font-size: 18px; font-weight: 600; color: var(--text); }
.title-block .game-title span { color: var(--accent); }

/* BGM 토글 */
.music-wrap { display: flex; align-items: center; gap: 8px; }
.music-wrap span { font-size: 11px; color: var(--muted); }
.toggle { position: relative; width: 36px; height: 20px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-track {
  position: absolute; inset: 0;
  background: var(--border2); border-radius: 20px;
  cursor: pointer; transition: background 0.2s;
}
.toggle input:checked + .toggle-track { background: var(--accent2); }
.toggle-track::after {
  content: ''; position: absolute;
  width: 14px; height: 14px; border-radius: 50%;
  background: #fff; top: 3px; left: 3px; transition: transform 0.2s;
}
.toggle input:checked + .toggle-track::after { transform: translateX(16px); }

/* ── 문 3개 ── */
.doors-wrap {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 10px; margin-bottom: 20px;
}
.door {
  aspect-ratio: 2/3;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  position: relative; overflow: hidden;
  user-select: none;
}
.door:hover:not(.no-hover) {
  border-color: var(--accent);
  background: rgba(167,139,250,0.05);
  transform: translateY(-3px);
}
.door-num {
  position: absolute; top: 10px;
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; color: var(--muted);
  text-transform: uppercase;
}
.door-icon {
  font-size: 2.4rem;
  opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  transform: scale(0.7);
}
.door-icon.show { opacity: 1; transform: scale(1); }

/* 상태별 문 색 */
.door.selected {
  border-color: var(--accent);
  background: rgba(167,139,250,0.08);
}
.door.revealed {
  border-color: var(--border2);
  background: var(--surface2);
  cursor: default;
}
.door.winner {
  border-color: var(--green);
  background: rgba(52,211,153,0.08);
}
.door.loser {
  border-color: var(--red);
  background: rgba(248,113,113,0.06);
}
.door.winner .door-icon { filter: drop-shadow(0 0 6px rgba(52,211,153,0.5)); }

/* ── 메시지 ── */
.msg-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px 18px;
  font-size: 12px; line-height: 1.7;
  color: var(--muted);
  min-height: 54px;
  margin-bottom: 16px;
}
.msg-box .highlight { color: var(--accent); font-weight: 500; }
.msg-box .win-text  { color: var(--green); font-weight: 500; }
.msg-box .lose-text { color: var(--red);   font-weight: 500; }

/* ── 통계 ── */
.stats-row {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-bottom: 16px;
}
.stat-cell {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px 8px;
  text-align: center;
}
.stat-val   { font-size: 20px; font-weight: 600; color: var(--text); line-height: 1; margin-bottom: 5px; }
.stat-label { font-size: 9px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }
.stat-cell.s-stay   .stat-val { color: var(--yellow); }
.stat-cell.s-switch .stat-val { color: var(--green); }

/* ── 자세히 보기 ── */
.detail-toggle {
  width: 100%; background: transparent;
  border: 1px solid var(--border); border-radius: 4px;
  color: var(--muted); font-family: var(--font); font-size: 11px;
  padding: 8px; cursor: pointer; margin-bottom: 8px;
  transition: all 0.15s; letter-spacing: 0.04em;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.detail-toggle:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
.detail-toggle .arrow { transition: transform 0.2s; display: inline-block; }
.detail-toggle.open .arrow { transform: rotate(180deg); }

#detailPanel {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 14px 16px;
  margin-bottom: 10px;
  display: none;
}
#detailPanel.show { display: block; }
.detail-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.detail-cell {
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 10px 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.detail-cell-label { font-size: 10px; color: var(--muted); letter-spacing: 0.03em; line-height: 1.5; }
.detail-cell-val   { font-size: 18px; font-weight: 600; flex-shrink: 0; margin-left: 8px; }
.detail-cell.sw  { border-color: rgba(52,211,153,0.3); }
.detail-cell.sw  .detail-cell-val { color: var(--green); }
.detail-cell.sl  { border-color: rgba(248,113,113,0.2); }
.detail-cell.sl  .detail-cell-val { color: var(--red); }
.detail-cell.stw { border-color: rgba(251,191,36,0.3); }
.detail-cell.stw .detail-cell-val { color: var(--yellow); }
.detail-cell.stl { border-color: rgba(113,113,122,0.3); }
.detail-cell.stl .detail-cell-val { color: var(--muted); }

/* ── 버튼 ── */
.btn-row {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.action-btn {
  padding: 10px 0;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--font); font-size: 11px;
  letter-spacing: 0.04em; cursor: pointer;
  transition: all 0.15s;
}
.action-btn:hover { border-color: var(--border2); background: var(--surface2); }
.action-btn:active { transform: scale(0.97); }
.action-btn.danger:hover { border-color: var(--red); color: var(--red); }

/* ── 확인 모달 ── */
#confirmModal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
}
#confirmModal.show { opacity: 1; pointer-events: all; }
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 24px 28px;
  text-align: center;
  max-width: 300px; width: 90%;
}
.modal-text { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 18px; }
.modal-text b { color: var(--text); }
.modal-btns { display: flex; gap: 8px; justify-content: center; }
.modal-btns button {
  flex: 1; padding: 10px;
  border-radius: 4px; font-family: var(--font); font-size: 12px;
  cursor: pointer; border: 1px solid var(--border); transition: all 0.15s;
}
#cfYes { background: var(--accent2); border-color: var(--accent2); color: #fff; }
#cfYes:hover { background: #6d28d9; }
#cfNo  { background: transparent; color: var(--text); }
#cfNo:hover { background: var(--surface2); }

/* ── 토스트 ── */
#toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 10px 20px;
  font-size: 12px; color: var(--text);
  white-space: nowrap;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s, transform 0.25s;
  z-index: 300;
}
#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<!-- 오버레이 -->
<div id="overlay">
  <div class="ov-label">확률 실험</div>
  <div class="ov-title">몬티 <span>홀</span></div>
  <div class="ov-desc">
    문 3개 중 하나에 상품이 있습니다.<br>
    문을 고르면 사회자가 <b>염소가 있는 문</b>을 열어줍니다.<br>
    선택을 바꿀까요, 유지할까요?
  </div>
  <button id="startBtn">시작하기</button>
</div>

<!-- 게임 -->
<div id="game">
  <div class="top-bar">
    <div class="title-block">
      <div class="game-label">몬티 홀 문제</div>
      <div class="game-title">문을 <span>선택</span>하세요</div>
    </div>
    <div class="music-wrap">
      <span>BGM</span>
      <label class="toggle">
        <input type="checkbox" id="musicToggle" checked>
        <div class="toggle-track"></div>
      </label>
    </div>
  </div>

  <div class="doors-wrap" id="doorsWrap">
    <div class="door" data-door="1">
      <div class="door-num">No.1</div>
      <div class="door-icon" id="icon1"></div>
    </div>
    <div class="door" data-door="2">
      <div class="door-num">No.2</div>
      <div class="door-icon" id="icon2"></div>
    </div>
    <div class="door" data-door="3">
      <div class="door-num">No.3</div>
      <div class="door-icon" id="icon3"></div>
    </div>
  </div>

  <div class="msg-box" id="msgBox">문을 선택해주세요.</div>

  <div class="stats-row">
    <div class="stat-cell">
      <div class="stat-val" id="totalWins" style="color:var(--green)">0</div>
      <div class="stat-label">승리</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val" id="totalLosses" style="color:var(--red)">0</div>
      <div class="stat-label">패배</div>
    </div>
    <div class="stat-cell">
      <div class="stat-val" id="totalGames">0</div>
      <div class="stat-label">총 게임</div>
    </div>
  </div>

  <button class="detail-toggle" id="detailToggle">
    자세히 보기 <span class="arrow">▾</span>
  </button>
  <div id="detailPanel">
    <div class="detail-grid">
      <div class="detail-cell sw">
        <div class="detail-cell-label">바꿔서<br>승리</div>
        <div class="detail-cell-val" id="switchWins">0</div>
      </div>
      <div class="detail-cell sl">
        <div class="detail-cell-label">바꿔서<br>패배</div>
        <div class="detail-cell-val" id="switchLosses">0</div>
      </div>
      <div class="detail-cell stw">
        <div class="detail-cell-label">유지해서<br>승리</div>
        <div class="detail-cell-val" id="stayWins">0</div>
      </div>
      <div class="detail-cell stl">
        <div class="detail-cell-label">유지해서<br>패배</div>
        <div class="detail-cell-val" id="stayLosses">0</div>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="action-btn" id="saveBtn">저장</button>
    <button class="action-btn" id="loadBtn">불러오기</button>
    <button class="action-btn danger" id="resetBtn">초기화</button>
  </div>
  <input type="file" id="fileInput" style="display:none" accept=".mhdata">
</div>

<!-- 확인 모달 -->
<div id="confirmModal">
  <div class="modal-box">
    <div class="modal-text" id="cfText">선택하시겠습니까?</div>
    <div class="modal-btns">
      <button id="cfYes">확인</button>
      <button id="cfNo">취소</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div id="toast"></div>

<script>
// ── Web Audio ──
let audioCtx = null, bgPlaying = false, bgNodes = null, bgTimerID = null;

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function startBgMusic() {
  if (bgPlaying) return;
  bgPlaying = true;
  scheduleBg();
}
function stopBgMusic() {
  bgPlaying = false;
  if (bgTimerID) { clearTimeout(bgTimerID); bgTimerID = null; }
  if (bgNodes) { try { bgNodes.forEach(n => n.stop && n.stop()); } catch(e){} bgNodes = null; }
}

// BGM: 긴장감 있는 서스펜스 루프 (4.8초)
function scheduleBg() {
  if (!bgPlaying) return;
  const ctx = getCtx();
  const dur = 4.8, now = ctx.currentTime;
  const nodes = [];

  const master = ctx.createGain();
  master.gain.setValueAtTime(0.2, now);
  master.connect(ctx.destination);

  // 저음 베이스 드론
  const droneFreqs = [55, 82.4, 110];
  droneFreqs.forEach((f, i) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(f, now);
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.18 - i * 0.04, now + 0.4);
    g.gain.setValueAtTime(0.18 - i * 0.04, now + dur - 0.5);
    g.gain.linearRampToValueAtTime(0, now + dur);
    osc.connect(g); g.connect(master);
    osc.start(now); osc.stop(now + dur + 0.1);
    nodes.push(osc);
  });

  // 서스펜스 피치카토 패턴
  const pizz = [
    {f:220, t:0.0}, {f:196, t:0.6}, {f:220, t:1.2}, {f:174.6, t:1.8},
    {f:220, t:2.4}, {f:196, t:3.0}, {f:246.9, t:3.6}, {f:220, t:4.2},
  ];
  pizz.forEach(({f, t}) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(f, now + t);
    g.gain.setValueAtTime(0.22, now + t);
    g.gain.exponentialRampToValueAtTime(0.001, now + t + 0.45);
    osc.connect(g); g.connect(master);
    osc.start(now + t); osc.stop(now + t + 0.5);
    nodes.push(osc);
  });

  // 하이햇
  [0, 0.6, 1.2, 1.8, 2.4, 3.0, 3.6, 4.2].forEach(t => {
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.05, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let j = 0; j < d.length; j++) d[j] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource(); src.buffer = buf;
    const hpf = ctx.createBiquadFilter(); hpf.type = 'highpass'; hpf.frequency.value = 7000;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.07, now + t);
    g.gain.exponentialRampToValueAtTime(0.001, now + t + 0.05);
    src.connect(hpf); hpf.connect(g); g.connect(master);
    src.start(now + t); src.stop(now + t + 0.06);
    nodes.push(src);
  });

  bgNodes = nodes;
  bgTimerID = setTimeout(() => { bgNodes = null; scheduleBg(); }, dur * 1000 - 30);
}

// 문 클릭음
function playDoorClick() {
  const ctx = getCtx();
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(440, ctx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(220, ctx.currentTime + 0.1);
  g.gain.setValueAtTime(0.15, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
  osc.connect(g); g.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.14);
}

// 문 열리는 소리 (삐걱)
function playReveal() {
  const ctx = getCtx();
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(300, ctx.currentTime);
  osc.frequency.linearRampToValueAtTime(180, ctx.currentTime + 0.3);
  g.gain.setValueAtTime(0.12, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
  osc.connect(g); g.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + 0.4);
}

// 승리음
function playWin() {
  const ctx = getCtx();
  [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(f, ctx.currentTime + i * 0.11);
    g.gain.setValueAtTime(0, ctx.currentTime + i * 0.11);
    g.gain.linearRampToValueAtTime(0.28, ctx.currentTime + i * 0.11 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.11 + 0.35);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(ctx.currentTime + i * 0.11);
    osc.stop(ctx.currentTime + i * 0.11 + 0.4);
  });
}

// 패배음
function playLose() {
  const ctx = getCtx();
  [392, 349.23, 311.13, 261.63].forEach((f, i) => {
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(f, ctx.currentTime + i * 0.14);
    g.gain.setValueAtTime(0, ctx.currentTime + i * 0.14);
    g.gain.linearRampToValueAtTime(0.2, ctx.currentTime + i * 0.14 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.14 + 0.35);
    osc.connect(g); g.connect(ctx.destination);
    osc.start(ctx.currentTime + i * 0.14);
    osc.stop(ctx.currentTime + i * 0.14 + 0.4);
  });
}

// ── 게임 로직 ──
let gameState = 'initial';
let prizeDoor, selectedDoor, revealedDoor, finalChoice;
let stayWins = 0, switchWins = 0, stayLosses = 0, switchLosses = 0, totalGames = 0;

const doors = document.querySelectorAll('.door');
const msgBox = document.getElementById('msgBox');

function setMsg(html) { msgBox.innerHTML = html; }

function getDoorEl(n) { return document.querySelector(`.door[data-door="${n}"]`); }
function getIcon(n)   { return document.getElementById('icon' + n); }

function initGame() {
  doors.forEach(d => {
    d.className = 'door';
    d.style.pointerEvents = '';
  });
  [1,2,3].forEach(n => {
    const ic = getIcon(n);
    ic.textContent = '';
    ic.classList.remove('show');
  });
  prizeDoor = Math.floor(Math.random() * 3) + 1;
  gameState = 'initial'; selectedDoor = null; revealedDoor = null; finalChoice = null;
  setMsg('문을 <span class="highlight">선택</span>해주세요.');
}

function revealGoatDoor() {
  const avail = [1,2,3].filter(n => n !== selectedDoor && n !== prizeDoor);
  revealedDoor = avail[Math.floor(Math.random() * avail.length)];
  const el = getDoorEl(revealedDoor);
  el.classList.add('revealed', 'no-hover');
  el.style.pointerEvents = 'none';
  const ic = getIcon(revealedDoor);
  ic.textContent = '🐐'; ic.classList.add('show');
  gameState = 'revealed';
  playReveal();
  setMsg(`문 <span class="highlight">${revealedDoor}</span> 뒤엔 염소가 있습니다.<br>선택을 <span class="highlight">바꾸거나</span> 유지하세요.`);
}

doors.forEach(door => {
  door.addEventListener('click', function() {
    const n = parseInt(this.dataset.door);
    if (gameState === 'initial') {
      selectedDoor = n;
      this.classList.add('selected');
      gameState = 'selected';
      playDoorClick();
      setMsg(`문 <span class="highlight">${n}</span>을 선택했습니다. 잠시 후 사회자가 문을 엽니다…`);
      setTimeout(revealGoatDoor, 600);
    } else if (gameState === 'revealed') {
      if (this.classList.contains('revealed')) return;
      finalChoice = n;
      const switching = finalChoice !== selectedDoor;
      document.getElementById('cfText').innerHTML = switching
        ? `문 <b>${selectedDoor}</b> 대신 문 <b>${finalChoice}</b>으로 바꾸시겠습니까?`
        : `문 <b>${selectedDoor}</b>을 유지하시겠습니까?`;
      document.getElementById('confirmModal').classList.add('show');
    } else if (gameState === 'final') {
      initGame();
    }
  });
});

function confirmFinalChoice() {
  const isWin = finalChoice === prizeDoor;
  const switched = finalChoice !== selectedDoor;
  totalGames++;
  if (isWin) { if (switched) switchWins++; else stayWins++; }
  else { if (switched) switchLosses++; else stayLosses++; }

  [1,2,3].forEach(n => {
    const el = getDoorEl(n);
    const ic = getIcon(n);
    if (n === prizeDoor) {
      ic.textContent = '🏆'; ic.classList.add('show');
      if (n === finalChoice) el.classList.add('winner');
    } else {
      if (!ic.classList.contains('show')) { ic.textContent = '🐐'; ic.classList.add('show'); }
      if (n === finalChoice) el.classList.add('loser');
    }
  });

  gameState = 'final';
  updateStats();
  saveLocal();

  if (isWin) {
    playWin();
    setMsg(`<span class="win-text">🎉 축하합니다!</span> 문 <span class="highlight">${finalChoice}</span> 뒤에 상품이 있습니다! (${switched ? '바꿈' : '유지'})<br><span style="color:var(--muted);font-size:11px">아무 문이나 클릭하면 다시 시작합니다.</span>`);
  } else {
    playLose();
    setMsg(`<span class="lose-text">😔 아쉽습니다.</span> 문 ${finalChoice} 뒤엔 염소가 있습니다. (${switched ? '바꿈' : '유지'})<br><span style="color:var(--muted);font-size:11px">아무 문이나 클릭하면 다시 시작합니다.</span>`);
  }
}

function updateStats() {
  const totalWins   = stayWins + switchWins;
  const totalLosses = stayLosses + switchLosses;
  document.getElementById('totalWins').textContent    = totalWins;
  document.getElementById('totalLosses').textContent  = totalLosses;
  document.getElementById('totalGames').textContent   = totalGames;
  document.getElementById('stayWins').textContent     = stayWins;
  document.getElementById('switchWins').textContent   = switchWins;
  document.getElementById('stayLosses').textContent   = stayLosses;
  document.getElementById('switchLosses').textContent = switchLosses;
}

// ── 데이터 저장/불러오기 ──
function encryptData(data) {
  let enc = btoa(JSON.stringify(data));
  return enc.split('').map(c => String.fromCharCode(c.charCodeAt(0) + 1)).join('');
}
function decryptData(enc) {
  try {
    let decoded = enc.split('').map(c => String.fromCharCode(c.charCodeAt(0) - 1)).join('');
    return JSON.parse(atob(decoded));
  } catch(e) { return null; }
}

function saveLocal() {
  localStorage.setItem('montyHallStats', JSON.stringify({ stayWins, switchWins, stayLosses, switchLosses, totalGames }));
}
function loadLocal() {
  const s = localStorage.getItem('montyHallStats');
  if (s) {
    try {
      const d = JSON.parse(s);
      stayWins = d.stayWins || 0; switchWins = d.switchWins || 0; stayLosses = d.stayLosses || 0; switchLosses = d.switchLosses || 0; totalGames = d.totalGames || 0;
      updateStats();
    } catch(e) {}
  }
}

function saveToFile() {
  const enc = encryptData({ stayWins, switchWins, stayLosses, switchLosses, totalGames, version: '1.0', savedAt: new Date().toISOString() });
  const blob = new Blob([enc], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `montyhall_${new Date().toISOString().slice(0,10)}.mhdata`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('✓ 저장 완료');
}
function loadFromFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const d = decryptData(e.target.result);
    if (d && d.version === '1.0') {
      stayWins = d.stayWins || 0; switchWins = d.switchWins || 0; stayLosses = d.stayLosses || 0; switchLosses = d.switchLosses || 0; totalGames = d.totalGames || 0;
      updateStats(); saveLocal(); showToast('✓ 불러오기 완료');
    } else { showToast('⚠ 잘못된 파일 형식'); }
  };
  reader.readAsText(file);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── 이벤트 연결 ──
document.getElementById('musicToggle').addEventListener('change', e => {
  e.target.checked ? startBgMusic() : stopBgMusic();
});

document.getElementById('cfYes').addEventListener('click', () => {
  document.getElementById('confirmModal').classList.remove('show');
  confirmFinalChoice();
});
document.getElementById('cfNo').addEventListener('click', () => {
  document.getElementById('confirmModal').classList.remove('show');
  finalChoice = null;
});

document.getElementById('saveBtn').addEventListener('click', saveToFile);
document.getElementById('loadBtn').addEventListener('click', () => {
  document.getElementById('fileInput').value = '';
  document.getElementById('fileInput').click();
});
document.getElementById('fileInput').addEventListener('change', e => {
  if (e.target.files.length) loadFromFile(e.target.files[0]);
});
document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('스코어를 초기화하시겠습니까?')) {
    stayWins = 0; switchWins = 0; stayLosses = 0; switchLosses = 0; totalGames = 0;
    updateStats(); saveLocal(); showToast('✓ 초기화 완료');
  }
});

document.getElementById('detailToggle').addEventListener('click', function() {
  this.classList.toggle('open');
  document.getElementById('detailPanel').classList.toggle('show');
});

document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('game').classList.add('show');
  startBgMusic();
  loadLocal();
  initGame();
});
</script>
</body>
</html>
