<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AES-256 파일 암호화</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230d0d0d'/%3E%3Crect x='8' y='16' width='16' height='11' rx='2.5' fill='%2300ff88'/%3E%3Cpath d='M11 16 v-4 a5 5 0 0 1 10 0 v4' fill='none' stroke='%2300ff88' stroke-width='2.2' stroke-linecap='round'/%3E%3Ccircle cx='16' cy='21' r='1.8' fill='%230d0d0d'/%3E%3Crect x='15.2' y='21' width='1.6' height='3' rx='0.5' fill='%230d0d0d'/%3E%3C/svg%3E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --border: #2a2a2a;
    --border-hover: #444;
    --text: #e8e8e8;
    --muted: #666;
    --accent: #00ff88;
    --accent-dim: rgba(0,255,136,0.08);
    --danger: #ff4d4d;
    --font: 'IBM Plex Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 32px;
  }

  .header {
    margin-bottom: 28px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
  }
  .header h1 {
    font-size: 14px; font-weight: 500;
    color: var(--accent); letter-spacing: 0.08em;
    text-transform: uppercase; margin-bottom: 4px;
  }
  .header p { font-size: 11px; color: var(--muted); }

  .field { margin-bottom: 16px; }
  label {
    display: block; font-size: 11px; color: var(--muted);
    letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 6px;
  }

  .dropzone {
    border: 1px dashed var(--border); border-radius: 3px;
    padding: 20px; text-align: center; cursor: pointer;
    transition: border-color 0.15s, background 0.15s; position: relative;
  }
  .dropzone:hover, .dropzone.dragover { border-color: var(--accent); background: var(--accent-dim); }
  .dropzone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .dropzone-icon { font-size: 22px; margin-bottom: 6px; }
  .dropzone-text { font-size: 12px; color: var(--muted); }
  .dropzone-name { font-size: 12px; color: var(--accent); margin-top: 4px; display: none; }

  .pw-wrap { position: relative; }
  .pw-wrap input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 3px; padding: 10px 40px 10px 12px;
    color: var(--text); font-family: var(--font); font-size: 13px;
    outline: none; transition: border-color 0.15s;
  }
  .pw-wrap input:focus { border-color: var(--accent); }
  .pw-toggle {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 14px; padding: 2px; line-height: 1;
  }
  .pw-toggle:hover { color: var(--text); }

  /* 힌트 필드 */
  .hint-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 3px; padding: 10px 12px;
    color: var(--text); font-family: var(--font); font-size: 13px;
    outline: none; transition: border-color 0.15s;
    resize: none;
  }
  .hint-input:focus { border-color: var(--accent); }
  .hint-input::placeholder { color: var(--muted); }
  .hint-input[readonly] {
    border-color: rgba(0,255,136,0.25);
    color: var(--accent);
    background: var(--accent-dim);
    cursor: default;
  }
  .hint-badge {
    display: inline-block;
    font-size: 10px;
    color: var(--accent);
    border: 1px solid rgba(0,255,136,0.3);
    border-radius: 2px;
    padding: 1px 5px;
    margin-left: 6px;
    vertical-align: middle;
    letter-spacing: 0.05em;
  }
  .hint-badge.hidden { display: none; }

  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 20px; }
  button.btn {
    padding: 11px; border-radius: 3px; font-family: var(--font);
    font-size: 12px; font-weight: 500; letter-spacing: 0.05em;
    cursor: pointer; transition: all 0.15s; border: 1px solid var(--border);
  }
  button.btn:hover:not(:disabled) { border-color: var(--border-hover); }
  button.btn:active:not(:disabled) { transform: scale(0.98); }
  button.btn:disabled { opacity: 0.3; cursor: default; }
  .btn-enc { background: var(--accent); color: #000; border-color: var(--accent); }
  .btn-enc:hover:not(:disabled) { background: #00e67a !important; border-color: #00e67a !important; }
  .btn-dec { background: transparent; color: var(--text); }

  #status {
    margin-top: 16px; padding: 10px 12px; border-radius: 3px;
    font-size: 12px; line-height: 1.5; display: none; word-break: break-all;
  }
  #status.info { background: var(--accent-dim); border: 1px solid rgba(0,255,136,0.2); color: var(--accent); }
  #status.error { background: rgba(255,77,77,0.08); border: 1px solid rgba(255,77,77,0.2); color: var(--danger); }

  #dl-wrap { margin-top: 12px; display: none; }
  #dl-btn {
    display: block; width: 100%; padding: 11px;
    background: transparent; border: 1px solid var(--accent);
    border-radius: 3px; color: var(--accent); font-family: var(--font);
    font-size: 12px; text-align: center; text-decoration: none; transition: background 0.15s;
  }
  #dl-btn:hover { background: var(--accent-dim); }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <h1>AES-256 파일 암호화</h1>
    <p>Web Crypto API — CDN 없음, 브라우저 내장, 서버 전송 없음</p>
  </div>

  <div class="field">
    <label style="display:block;font-size:11px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;">파일</label>
    <div class="dropzone" id="dropzone" role="button" tabindex="0">
      <input type="file" id="fileInput" style="display:none;">
      <div class="dropzone-icon">📁</div>
      <div class="dropzone-text">클릭하거나 파일을 드래그</div>
      <div class="dropzone-name" id="fileName"></div>
    </div>
  </div>

  <div class="field">
    <label>비밀번호</label>
    <div class="pw-wrap">
      <input type="password" id="pwInput" placeholder="비밀번호 입력...">
      <button class="pw-toggle" id="pwToggle" type="button">👁</button>
    </div>
  </div>

  <div class="field" id="hintField">
    <label>
      힌트
      <span class="hint-badge hidden" id="hintBadge">파일에서 로드됨</span>
    </label>
    <input type="text" class="hint-input" id="hintInput" placeholder="비밀번호 힌트 입력 (선택)...">
  </div>

  <div class="btn-row">
    <button class="btn btn-enc" id="btnEnc">암호화</button>
    <button class="btn btn-dec" id="btnDec">복호화</button>
  </div>

  <div id="status"></div>
  <div id="dl-wrap"><a id="dl-btn" href="#" download>⬇ 다운로드</a></div>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const dropzone  = document.getElementById('dropzone');
const fileName  = document.getElementById('fileName');
const pwInput   = document.getElementById('pwInput');
const pwToggle  = document.getElementById('pwToggle');
const hintInput = document.getElementById('hintInput');
const hintBadge = document.getElementById('hintBadge');
const status    = document.getElementById('status');
const dlWrap    = document.getElementById('dl-wrap');
const dlBtn     = document.getElementById('dl-btn');

// 암호화 포맷 매직 바이트: "AESH" (AES with Hint)
const MAGIC = new Uint8Array([0x41, 0x45, 0x53, 0x48]);

// 힌트 상태 초기화
function resetHint() {
  hintInput.value = '';
  hintInput.readOnly = false;
  hintInput.placeholder = '비밀번호 힌트 입력 (선택)...';
  hintBadge.classList.add('hidden');
}

// .enc 파일 로드 시 힌트 파싱 시도
async function tryLoadHint(file) {
  try {
    const buf = await file.arrayBuffer();
    const b = new Uint8Array(buf);

    // 매직 바이트 확인
    if (b[0] === MAGIC[0] && b[1] === MAGIC[1] && b[2] === MAGIC[2] && b[3] === MAGIC[3]) {
      // 포맷: MAGIC(4) + hintLen(2, uint16 BE) + hintBytes + salt(16) + iv(12) + ciphertext
      const hintLen = (b[4] << 8) | b[5];
      if (hintLen > 0 && hintLen <= 500) {
        const hintBytes = b.slice(6, 6 + hintLen);
        const hint = new TextDecoder().decode(hintBytes);
        hintInput.value = hint;
        hintInput.readOnly = true;
        hintBadge.classList.remove('hidden');
      } else {
        // 힌트 없이 암호화된 경우
        resetHint();
      }
      return true; // 자체 포맷 파일
    }
    return false; // 일반 파일 (암호화 대상)
  } catch {
    return false;
  }
}

// 선택된 파일 저장
let selectedFile = null;

async function pickFile() {
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

  // 1. 데스크톱용 (기존 유지)
  if (!isMobile && window.showOpenFilePicker) {
    try {
      const [handle] = await window.showOpenFilePicker({ multiple: false });
      return await handle.getFile();
    } catch (e) {
      if (e.name === 'AbortError') return null;
    }
  }

  // 2. 모바일/안드로이드용 (완전 새 태그 생성 방식)
  return new Promise(resolve => {
    // 메모리상에 임시 input 생성 (HTML에 있는 기존 fileInput을 무시)
    const tmpInput = document.createElement('input');
    tmpInput.type = 'file';
    
    // 중요: accept를 아예 설정하지 않거나, 아래처럼 범용적으로 설정
    // 갤럭시에서 '파일' 앱을 띄우기 위해 가장 깨끗한 상태 유지
    tmpInput.accept = ".enc, .txt, .zip, application/octet-stream";

    tmpInput.onchange = () => {
      if (tmpInput.files.length > 0) {
        resolve(tmpInput.files[0]);
      } else {
        resolve(null);
      }
    };

    // 안드로이드 시스템에 신호를 보냄
    tmpInput.click();
  });
}

function setFile(file) {
  if (!file) return;
  selectedFile = file;
  fileName.textContent = file.name;
  fileName.style.display = 'block';
  dlWrap.style.display = 'none';
  status.style.display = 'none';
  if (file.name.endsWith('.enc')) {
    tryLoadHint(file);
  } else {
    resetHint();
  }
}

dropzone.addEventListener('click', async () => {
  const file = await pickFile();
  if (file) setFile(file);
});
dropzone.addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') dropzone.click();
});

dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
dropzone.addEventListener('drop', async e => {
  e.preventDefault(); dropzone.classList.remove('dragover');
  if (e.dataTransfer.files[0]) setFile(e.dataTransfer.files[0]);
});

pwToggle.addEventListener('click', () => {
  const isText = pwInput.type === 'text';
  pwInput.type = isText ? 'password' : 'text';
  pwToggle.textContent = isText ? '👁' : '🙈';
});

function showStatus(msg, type) {
  status.textContent = msg; status.className = type; status.style.display = 'block';
}
function setDownload(blob, name) {
  const url = URL.createObjectURL(blob);
  dlBtn.href = url; dlBtn.download = name;
  dlBtn.textContent = `⬇ ${name} 다운로드`;
  dlWrap.style.display = 'block';
  dlBtn.onclick = () => setTimeout(() => URL.revokeObjectURL(url), 1500);
}
function validate() {
  if (!selectedFile)    { showStatus('파일을 선택해주세요.', 'error'); return false; }
  if (!pwInput.value)   { showStatus('비밀번호를 입력해주세요.', 'error'); return false; }
  return true;
}

// 작업 완료 후 민감 정보 전부 초기화
function clearAfterOp() {
  // 비밀번호 초기화 (메모리에서도 지우기 위해 덮어쓴 뒤 클리어)
  pwInput.value = ' '.repeat(pwInput.value.length);
  pwInput.value = '';
  // 비밀번호 표시 상태가 text였으면 다시 password로
  if (pwInput.type === 'text') {
    pwInput.type = 'password';
    pwToggle.textContent = '👁';
  }

  selectedFile = null;

  // 힌트 초기화
  resetHint();
}

// 비밀번호 → AES-256 키 (PBKDF2, 200000 iterations)
async function deriveKey(password, salt) {
  const base = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
  );
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 200000, hash: 'SHA-256' },
    base,
    { name: 'AES-GCM', length: 256 },
    false, ['encrypt', 'decrypt']
  );
}

// 암호화: MAGIC(4) + hintLen(2) + hint(N) + salt(16) + iv(12) + ciphertext
document.getElementById('btnEnc').addEventListener('click', async () => {
  if (!validate()) return;
  dlWrap.style.display = 'none';
  showStatus('암호화 중...', 'info');
  try {
    const data  = await selectedFile.arrayBuffer();
    const salt  = crypto.getRandomValues(new Uint8Array(16));
    const iv    = crypto.getRandomValues(new Uint8Array(12));
    const key   = await deriveKey(pwInput.value, salt);
    const enc   = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, data);

    const hintStr   = hintInput.value.trim();
    const hintBytes = hintStr ? new TextEncoder().encode(hintStr) : new Uint8Array(0);
    const hintLen   = hintBytes.length;

    // 헤더: MAGIC(4) + hintLen(2 bytes, BE) + hint + salt(16) + iv(12)
    const headerSize = 4 + 2 + hintLen + 16 + 12;
    const out = new Uint8Array(headerSize + enc.byteLength);

    let offset = 0;
    out.set(MAGIC, offset); offset += 4;
    out[offset] = (hintLen >> 8) & 0xff; offset++;
    out[offset] = hintLen & 0xff; offset++;
    if (hintLen > 0) { out.set(hintBytes, offset); offset += hintLen; }
    out.set(salt, offset); offset += 16;
    out.set(iv,   offset); offset += 12;
    out.set(new Uint8Array(enc), offset);

    const outName = selectedFile.name + '.enc';
    setDownload(new Blob([out]), outName);
    showStatus('암호화 완료!' + (hintLen > 0 ? ' (힌트 포함)' : ''), 'info');
    clearAfterOp();
  } catch (e) { showStatus('오류: ' + e.message, 'error'); }
});

// 복호화: 포맷 감지 후 분기
document.getElementById('btnDec').addEventListener('click', async () => {
  if (!validate()) return;
  dlWrap.style.display = 'none';
  showStatus('복호화 중...', 'info');
  try {
    const buf = await selectedFile.arrayBuffer();
    const b   = new Uint8Array(buf);

    let salt, iv, ciphertext;

    // 자체 포맷 (매직 바이트 있음)
    if (b[0] === MAGIC[0] && b[1] === MAGIC[1] && b[2] === MAGIC[2] && b[3] === MAGIC[3]) {
      const hintLen = (b[4] << 8) | b[5];
      let offset = 6 + hintLen;
      salt       = b.slice(offset, offset + 16); offset += 16;
      iv         = b.slice(offset, offset + 12); offset += 12;
      ciphertext = b.slice(offset);
    } else {
      // 구버전 포맷 호환: salt(16) + iv(12) + ciphertext
      if (buf.byteLength < 28) throw new Error('파일이 너무 작습니다.');
      salt       = b.slice(0, 16);
      iv         = b.slice(16, 28);
      ciphertext = b.slice(28);
    }

    const key = await deriveKey(pwInput.value, salt);
    const dec = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ciphertext);
    const name = selectedFile.name;
    const outName = name.endsWith('.enc') ? name.slice(0, -4) : 'decrypted_' + name;
    setDownload(new Blob([dec]), outName);
    showStatus('복호화 완료!', 'info');
    clearAfterOp();
  } catch { showStatus('오류: 비밀번호가 틀렸거나 손상된 파일입니다.', 'error'); }
});
</script>
</body>
</html>
